<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Findsy - Оцінка учасників</title>
    
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Rounded:opsz,wght,FILL,GRAD@24,600,1,0" />

    <style>
        :root {
            --brand-main: #8a2be2;
            --brand-gradient: linear-gradient(135deg, #8a2be2, #ff267e);
            --bg-light: #F5F5F7;
            --bg-card: #FFFFFF;
            --text-main: #1C1C1E;
            --text-muted: #8E8E93;
            --star-empty: #E5E5EA;
            --star-filled: #FFD700;
            --success: #00E676;
            --border-light: #E5E5EA;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Inter', sans-serif; }
        body { background-color: var(--bg-light); color: var(--text-main); min-height: 100vh; display: flex; flex-direction: column; }

        .header {
            padding: 20px;
            background: var(--bg-card);
            position: sticky;
            top: 0;
            z-index: 10;
            border-bottom: 1px solid var(--border-light);
            display: flex;
            align-items: center;
            gap: 15px;
        }

        .back-btn {
            background: var(--bg-light);
            border: none;
            width: 40px; height: 40px;
            border-radius: 50%;
            display: flex; align-items: center; justify-content: center;
            cursor: pointer; color: var(--text-main);
        }

        h1 { font-size: 20px; font-weight: 800; letter-spacing: -0.5px; }

        .content { padding: 20px; flex-grow: 1; }
        
        .page-desc {
            font-size: 14px;
            color: var(--text-muted);
            margin-bottom: 20px;
            line-height: 1.4;
            font-weight: 500;
        }

        .participant-card {
            background: var(--bg-card);
            border-radius: 20px;
            padding: 16px;
            margin-bottom: 15px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.03);
            border: 1px solid var(--border-light);
            transition: 0.3s;
        }

        .participant-card.rated {
            background: #f0fdf4; /* Світло-зелений фон для оцінених */
            border-color: #bbf7d0;
        }

        .user-info {
            display: flex;
            align-items: center;
            gap: 12px;
            margin-bottom: 15px;
        }

        .avatar {
            width: 46px; height: 46px;
            border-radius: 50%;
            object-fit: cover;
            background: var(--bg-light);
            border: 2px solid white;
            box-shadow: 0 2px 8px rgba(0,0,0,0.05);
        }

        .user-name { font-weight: 800; font-size: 16px; color: var(--text-main); }
        
        .stars-container {
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: var(--bg-light);
            padding: 10px 15px;
            border-radius: 16px;
        }

        .star-btn {
            font-size: 32px;
            color: var(--star-empty);
            cursor: pointer;
            transition: 0.2s transform;
            font-variation-settings: 'FILL' 1;
        }

        .star-btn:active { transform: scale(0.8); }
        .star-btn.filled { color: var(--star-filled); }

        .success-msg {
            display: none;
            color: var(--success);
            font-weight: 700;
            font-size: 14px;
            text-align: center;
            padding: 10px;
        }

        .participant-card.rated .stars-container { display: none; }
        .participant-card.rated .success-msg { display: flex; align-items: center; justify-content: center; gap: 6px; }

        .empty-state {
            text-align: center;
            padding: 40px 20px;
            color: var(--text-muted);
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .btn-done {
            width: 100%;
            padding: 18px;
            border-radius: 20px;
            background: var(--brand-main);
            color: white;
            font-size: 17px;
            font-weight: 800;
            border: none;
            cursor: pointer;
            margin-top: 10px;
            box-shadow: 0 8px 20px rgba(138, 43, 226, 0.3);
            display: none; /* Показуємо, коли всіх оцінено */
        }
    </style>
</head>
<body>

    <div class="header">
        <button class="back-btn" onclick="tg.close()"><span class="material-symbols-rounded">close</span></button>
        <h1>Оцінка учасників</h1>
    </div>

    <div class="content">
        <p class="page-desc" id="page-desc">Обери кількість зірочок для кожного учасника, щоб допомогти формувати чесний рейтинг спільноти.</p>
        
        <div id="participants-list">
            <div style="text-align:center; padding: 20px; color: var(--text-muted);">
                Завантаження учасників...
            </div>
        </div>

        <button class="btn-done" id="btn-done" onclick="tg.close()">Усіх оцінено! Закрити</button>
    </div>

    <script>
        const tg = window.Telegram.WebApp;
        tg.ready(); tg.expand();

        function vibrate(style = 'light') { if (tg.HapticFeedback) tg.HapticFeedback.impactOccurred(style); }

        const urlParams = new URLSearchParams(window.location.search);
        const eventId = urlParams.get('event_id');
        const myId = tg.initDataUnsafe?.user?.id || 0;

        let totalParticipants = 0;
        let ratedParticipants = 0;

        if (!eventId) {
            document.getElementById('participants-list').innerHTML = '<div class="empty-state">Помилка: Івент не знайдено.</div>';
        } else {
            loadParticipants();
        }

        function loadParticipants() {
            fetch(`/api/events/${eventId}/participants`)
                .then(r => r.json())
                .then(participants => {
                    const listContainer = document.getElementById('participants-list');
                    
                    if (!participants || participants.length === 0) {
                        listContainer.innerHTML = `
                            <div class="empty-state">
                                <span class="material-symbols-rounded" style="font-size: 48px; color: #ccc; margin-bottom:10px;">group_off</span>
                                <p>На цьому івенті не було учасників з Findsy.</p>
                            </div>
                        `;
                        document.getElementById('page-desc').style.display = 'none';
                        return;
                    }

                    totalParticipants = participants.length;
                    let html = '';

                    participants.forEach(p => {
                        const safeAvatar = p.photo || `https://ui-avatars.com/api/?name=${encodeURIComponent(p.name || 'User')}&background=8a2be2&color=fff`;
                        
                        html += `
                            <div class="participant-card" id="card-${p.id}">
                                <div class="user-info">
                                    <img src="${safeAvatar}" class="avatar" alt="Avatar">
                                    <div class="user-name">${p.name || 'Учасник'}</div>
                                </div>
                                
                                <div class="stars-container" id="stars-${p.id}">
                                    <span class="material-symbols-rounded star-btn" onclick="rateUser(${p.id}, 1, this)">star</span>
                                    <span class="material-symbols-rounded star-btn" onclick="rateUser(${p.id}, 2, this)">star</span>
                                    <span class="material-symbols-rounded star-btn" onclick="rateUser(${p.id}, 3, this)">star</span>
                                    <span class="material-symbols-rounded star-btn" onclick="rateUser(${p.id}, 4, this)">star</span>
                                    <span class="material-symbols-rounded star-btn" onclick="rateUser(${p.id}, 5, this)">star</span>
                                </div>
                                
                                <div class="success-msg" id="success-${p.id}">
                                    <span class="material-symbols-rounded">check_circle</span> Оцінено
                                </div>
                            </div>
                        `;
                    });

                    listContainer.innerHTML = html;
                })
                .catch(err => {
                    document.getElementById('participants-list').innerHTML = '<div class="empty-state">Помилка завантаження.</div>';
                });
        }

        // Логіка візуального зафарбовування зірочок
        function highlightStars(container, score) {
            const stars = container.querySelectorAll('.star-btn');
            stars.forEach((star, index) => {
                if (index < score) star.classList.add('filled');
                else star.classList.remove('filled');
            });
        }

        function rateUser(targetId, score, starElement) {
            vibrate('medium');
            
            // Зафарбовуємо зірочки візуально перед відправкою
            const container = document.getElementById(`stars-${targetId}`);
            highlightStars(container, score);
            
            // Робимо всі зірочки неклікабельними під час запиту
            container.style.pointerEvents = 'none';
            container.style.opacity = '0.7';

            // Відправляємо запит на сервер
            fetch('/api/rating/submit', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    event_id: parseInt(eventId),
                    from_user_id: myId,
                    to_user_id: parseInt(targetId),
                    role_evaluated: 'participant', // Організатор оцінює УЧАСНИКА
                    score: score
                })
            })
            .then(r => r.json())
            .then(data => {
                if (data.success || data.error === 'already_rated') {
                    vibrate('success');
                    // Анімація успіху
                    const card = document.getElementById(`card-${targetId}`);
                    card.classList.add('rated');
                    
                    ratedParticipants++;
                    checkAllRated();
                } else {
                    tg.showAlert("Помилка збереження оцінки.");
                    container.style.pointerEvents = 'auto';
                    container.style.opacity = '1';
                }
            })
            .catch(() => {
                tg.showAlert("Помилка мережі.");
                container.style.pointerEvents = 'auto';
                container.style.opacity = '1';
            });
        }

        function checkAllRated() {
            if (ratedParticipants >= totalParticipants && totalParticipants > 0) {
                document.getElementById('btn-done').style.display = 'block';
                document.getElementById('page-desc').innerText = "Дякуємо! Усі учасники отримали свої оцінки.";
                document.getElementById('page-desc').style.color = "var(--success)";
            }
        }
    </script>
</body>
</html>
