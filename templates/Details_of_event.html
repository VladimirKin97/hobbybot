<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Findsy - Деталі івенту</title>
    
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Rounded:opsz,wght,FILL,GRAD@24,600,1,0" />

    <style>
        :root {
            --tg-theme-bg-color: #ffffff;
            --tg-theme-text-color: #222222;
            --tg-theme-button-color: #8a2be2;
            --text-muted: #777777;
            --bg-secondary: #f5f5f5;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; }
        body { background-color: var(--tg-theme-bg-color); color: var(--tg-theme-text-color); padding-bottom: 90px; }

        .hero-image {
            width: 100%; height: 300px;
            background-color: #333; background-size: cover; background-position: center; position: relative;
        }
        .back-btn {
            position: absolute; top: 20px; left: 20px;
            width: 40px; height: 40px; background: rgba(255,255,255,0.8); backdrop-filter: blur(5px);
            border-radius: 50%; display: flex; justify-content: center; align-items: center;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1); cursor: pointer; color: #333;
        }

        .content {
            background: var(--tg-theme-bg-color); border-top-left-radius: 24px; border-top-right-radius: 24px;
            margin-top: -24px; position: relative; padding: 24px; z-index: 10; min-height: 50vh;
        }

        .tags { display: flex; gap: 8px; margin-bottom: 12px; flex-wrap: wrap; }
        .tag { background: var(--bg-secondary); color: var(--tg-theme-button-color); padding: 6px 12px; border-radius: 12px; font-size: 12px; font-weight: 700; }
        .tag.hot { background: #fff0f0; color: #ff3b30; }
        
        h1 { font-size: 26px; font-weight: 800; margin-bottom: 15px; line-height: 1.2; }

        .logistics-box {
            background: var(--bg-secondary); border-radius: 16px; padding: 16px;
            display: flex; flex-direction: column; gap: 12px; margin-bottom: 24px;
        }
        .log-row { display: flex; align-items: center; gap: 12px; font-size: 15px; font-weight: 500; }
        .log-icon { background: white; width: 36px; height: 36px; border-radius: 50%; display: flex; justify-content: center; align-items: center; color: var(--tg-theme-button-color); box-shadow: 0 2px 5px rgba(0,0,0,0.05); }

        .section-title { font-size: 18px; font-weight: 700; margin-bottom: 12px; }
        .organizer-card { display: flex; justify-content: space-between; align-items: center; padding-bottom: 20px; border-bottom: 1px solid #eee; margin-bottom: 20px; }
        .org-left { display: flex; align-items: center; gap: 12px; }
        .org-avatar { width: 50px; height: 50px; border-radius: 50%; background-image: url('https://i.pravatar.cc/150?img=11'); background-size: cover; }
        .org-name { font-weight: 700; font-size: 16px; }
        .org-rating { font-size: 14px; color: #ff9800; display: flex; align-items: center; gap: 4px; margin-top: 2px;}
        .org-badge { background: #e0f7fa; color: #0097a7; font-size: 11px; padding: 3px 8px; border-radius: 8px; font-weight: 700; }

        .description { font-size: 15px; color: #444; line-height: 1.6; margin-bottom: 24px; white-space: pre-wrap; }

        .participants { display: flex; align-items: center; gap: 10px; margin-bottom: 30px;}
        .avatars-group { display: flex; }
        .avatars-group img { width: 40px; height: 40px; border-radius: 50%; border: 2px solid white; margin-left: -10px; object-fit: cover; }
        .avatars-group img:first-child { margin-left: 0; }
        .empty-slot { width: 40px; height: 40px; border-radius: 50%; border: 2px dashed #ccc; display: flex; justify-content: center; align-items: center; color: #aaa; margin-left: -10px; background: white;}
        .part-text { font-size: 14px; color: var(--text-muted); font-weight: 500; }

        .sticky-footer {
            position: fixed; bottom: 0; left: 0; right: 0; background: rgba(255,255,255,0.95);
            backdrop-filter: blur(10px); padding: 15px 20px 25px 20px; border-top: 1px solid #eee; z-index: 100;
        }
        .btn-join {
            width: 100%; padding: 16px; border-radius: 16px; background: linear-gradient(135deg, #8a2be2, #b026ff);
            color: white; border: none; font-size: 18px; font-weight: 700; cursor: pointer;
            box-shadow: 0 8px 20px rgba(138, 43, 226, 0.3); transition: transform 0.1s;
        }
        .btn-join:active { transform: scale(0.98); }
        .btn-join:disabled { background: #ccc; box-shadow: none; cursor: not-allowed; }
    </style>
</head>
<body>

    <div class="hero-image" id="ui-photo">
        <div class="back-btn" onclick="goBack()"><span class="material-symbols-rounded">arrow_back</span></div>
    </div>

    <div class="content">
        <div class="tags" id="ui-tags">
            <div class="tag">Завантаження...</div>
        </div>
        <h1 id="ui-title">Завантаження...</h1>

        <div class="logistics-box">
            <div class="log-row">
                <div class="log-icon"><span class="material-symbols-rounded" style="font-size:20px;">calendar_today</span></div>
                <div id="ui-datetime">...</div>
            </div>
            <div class="log-row">
                <div class="log-icon"><span class="material-symbols-rounded" style="font-size:20px;">location_on</span></div>
                <div id="ui-location">...</div>
            </div>
        </div>

        <h2 class="section-title">Організатор</h2>
        <div class="organizer-card">
            <div class="org-left">
                <div class="org-avatar"></div>
                <div>
                    <div class="org-name"><span id="ui-creator">...</span> <span class="material-symbols-rounded" style="color:#2196f3; font-size:16px; vertical-align:middle;">verified</span></div>
                    <div class="org-rating"><span class="material-symbols-rounded" style="font-size:16px;">star</span> 5.0 (Новачок)</div>
                </div>
            </div>
            <div class="org-badge">Findsy</div>
        </div>

        <h2 class="section-title">Про подію</h2>
        <div class="description" id="ui-desc">
            Завантаження інформації...
        </div>

        <h2 class="section-title" id="ui-capacity-title">Компанія</h2>
        <div class="participants">
            <div class="avatars-group" id="ui-avatars">
                </div>
            <div class="part-text" id="ui-needed-text">...</div>
        </div>

    </div>

    <div class="sticky-footer" id="footer-container">
        <button class="btn-join" id="join-btn" onclick="sendJoinRequest()">🙋‍♂️ Долучитися</button>
    </div>

    <script>
        const tg = window.Telegram.WebApp;
        tg.ready(); tg.expand();
        tg.BackButton.show();
        tg.onEvent('backButtonClicked', goBack);

        function vibrate(style = 'light') { if (tg.HapticFeedback) { tg.HapticFeedback.impactOccurred(style); } }
        function goBack() { window.history.back(); }

        const myUserId = tg.initDataUnsafe?.user?.id || 0;
        
        // Дістаємо ID івенту з посилання
        const urlParams = new URLSearchParams(window.location.search);
        const eventId = urlParams.get('id');

        if (!eventId) {
            tg.showAlert("Помилка: Івент не знайдено");
            goBack();
        } else {
            fetchEventData();
        }

        function fetchEventData() {
            fetch(`/api/events/${eventId}`)
                .then(r => r.json())
                .then(event => {
                    if (event.detail) {
                        tg.showAlert("Івент видалено або не існує.");
                        goBack();
                        return;
                    }

                    // 1. Фото
                    const fallbackImg = 'https://images.unsplash.com/photo-1511886929837-354d827aae26?ixlib=rb-4.0.3&auto=format&fit=crop&w=800&q=80';
                    const bgImage = (event.photo && event.photo.startsWith('data:image')) ? event.photo : fallbackImg;
                    document.getElementById('ui-photo').style.backgroundImage = `url('${bgImage}')`;

                    // 2. Текст
                    document.getElementById('ui-title').innerText = event.title || 'Без назви';
                    document.getElementById('ui-desc').innerText = event.description || 'Опис відсутній.';
                    document.getElementById('ui-creator').innerText = event.creator_name || 'Анонім';
                    
                    // Локація і дата
                    document.getElementById('ui-location').innerText = event.location || 'Локація не вказана';
                    if(event.date) {
                        const d = new Date(event.date);
                        document.getElementById('ui-datetime').innerText = d.toLocaleDateString('uk-UA', {weekday: 'short', day: '2-digit', month: 'long'}) + ', ' + d.toLocaleTimeString('uk-UA', {hour: '2-digit', minute:'2-digit'});
                    }

                    // 3. Математика учасників
                    const cap = event.capacity || 2;
                    const needed = event.needed_count !== undefined ? event.needed_count : cap;
                    const taken = cap - needed;

                    document.getElementById('ui-capacity-title').innerText = `Компанія (${taken}/${cap})`;
                    
                    // Генеруємо Теги
                    let tagsHtml = `<div class="tag">Відкрито</div>`;
                    if (needed === 1) tagsHtml += `<div class="tag hot">🔥 Останнє місце</div>`;
                    document.getElementById('ui-tags').innerHTML = tagsHtml;

                    // Генеруємо аватарки (1 орг + зайняті місця + порожні слоти)
                    let avatarsHtml = `<img src="https://ui-avatars.com/api/?name=${event.creator_name}&background=random" alt="Орг">`;
                    for(let i = 0; i < taken - 1; i++) {
                        avatarsHtml += `<img src="https://i.pravatar.cc/150?img=${30+i}" alt="Учасник">`;
                    }
                    for(let i = 0; i < needed; i++) {
                        avatarsHtml += `<div class="empty-slot"><span class="material-symbols-rounded" style="font-size:18px;">person_add</span></div>`;
                    }
                    document.getElementById('ui-avatars').innerHTML = avatarsHtml;
                    document.getElementById('ui-needed-text').innerText = needed > 0 ? `Шукаємо ще ${needed} люд.` : "Місць немає";

                    // 4. ЛОГІКА КНОПКИ (Приховуємо, якщо це мій івент)
                    if (event.user_id === myUserId) {
                        const footer = document.getElementById('footer-container');
                        footer.innerHTML = `<button class="btn-join" style="background: #E5E5EA; color: #8E8E93; box-shadow: none;" onclick="tg.showAlert('Тут буде редагування івенту')">⚙️ Це твій івент</button>`;
                    }
                })
                .catch(e => {
                    console.error(e);
                    tg.showAlert("Помилка зв'язку з сервером.");
                });
        }

        function sendJoinRequest() {
            vibrate('medium');
            const btn = document.getElementById('join-btn');
            btn.innerText = "Відправка...";
            btn.disabled = true;

            fetch('/api/events/join', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ event_id: parseInt(eventId), user_id: myUserId })
            })
            .then(r => r.json())
            .then(data => {
                if(data.success) {
                    vibrate('success');
                    btn.innerText = "✅ Заявка відправлена";
                    btn.style.background = "#00E676";
                    btn.style.boxShadow = "0 8px 20px rgba(0, 230, 118, 0.3)";
                    tg.showAlert("Заявку надіслано! Організатор отримає повідомлення.");
                } else {
                    tg.showAlert("Помилка відправки заявки. Можливо, ти вже подавав(ла) її?");
                    btn.innerText = "🙋‍♂️ Долучитися";
                    btn.disabled = false;
                }
            })
            .catch(e => {
                tg.showAlert("Помилка з'єднання.");
                btn.innerText = "🙋‍♂️ Долучитися";
                btn.disabled = false;
            });
        }
    </script>
</body>
</html>
