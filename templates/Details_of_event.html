<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Findsy - Деталі івенту</title>
    
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Rounded:opsz,wght,FILL,GRAD@24,600,1,0" />
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

    <style>
        /* Жорстко фіксуємо світлу тему, ігноруємо налаштування ТГ */
        :root {
            --brand-main: #8a2be2;
            --brand-gradient: linear-gradient(135deg, #8a2be2, #ff267e);
            --bg-light: #FFFFFF;
            --bg-secondary: #F5F5F7;
            --text-main: #1C1C1E;
            --text-muted: #8E8E93;
            --success: #00E676;
            --border-light: #E5E5EA;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Inter', sans-serif; }
        body { background-color: var(--bg-light); color: var(--text-main); padding-bottom: 90px; }

        /* Обкладинка */
        .hero-image {
            width: 100%; height: 320px;
            background-color: #333; background-size: cover; background-position: center; position: relative;
        }
        
        /* Кнопки поверх фото */
        .top-actions {
            position: absolute; top: 20px; left: 20px; right: 20px;
            display: flex; justify-content: space-between; z-index: 20;
        }
        .icon-btn {
            width: 44px; height: 44px; background: rgba(255,255,255,0.85); backdrop-filter: blur(10px);
            border-radius: 50%; display: flex; justify-content: center; align-items: center;
            box-shadow: 0 4px 15px rgba(0,0,0,0.15); cursor: pointer; color: var(--text-main);
        }

        /* Основний контент */
        .content {
            background: var(--bg-light); border-top-left-radius: 28px; border-top-right-radius: 28px;
            margin-top: -30px; position: relative; padding: 24px; z-index: 10; min-height: 50vh;
            box-shadow: 0 -5px 20px rgba(0,0,0,0.05);
        }

        .tags { display: flex; gap: 8px; margin-bottom: 15px; flex-wrap: wrap; }
        .tag { background: var(--bg-secondary); color: var(--brand-main); padding: 6px 14px; border-radius: 12px; font-size: 13px; font-weight: 700; }
        .tag.hot { background: #fff0f5; color: #ff267e; }
        
        h1 { font-size: 28px; font-weight: 800; margin-bottom: 20px; line-height: 1.2; letter-spacing: -0.5px; color: var(--text-main); }

        /* Блок Логістики + Міні-мапа */
        .logistics-box {
            background: var(--bg-secondary); border-radius: 20px; padding: 16px;
            display: flex; justify-content: space-between; align-items: center; margin-bottom: 28px;
            border: 1px solid var(--border-light);
        }
        .log-info { display: flex; flex-direction: column; gap: 14px; flex-grow: 1; padding-right: 15px; }
        .log-row { display: flex; align-items: center; gap: 12px; font-size: 15px; font-weight: 600; color: var(--text-main); }
        .log-icon { background: white; width: 38px; height: 38px; border-radius: 50%; display: flex; justify-content: center; align-items: center; color: var(--brand-main); box-shadow: 0 2px 8px rgba(0,0,0,0.05); flex-shrink: 0; }
        
        .mini-map-container {
            width: 80px; height: 80px; border-radius: 50%; border: 3px solid white;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1); overflow: hidden; flex-shrink: 0;
            position: relative;
        }
        #mini-map { width: 100%; height: 100%; filter: grayscale(100%) opacity(0.9); pointer-events: none; }
        .penguin-marker img { width: 100%; height: 100%; object-fit: contain; filter: drop-shadow(0 4px 6px rgba(138,43,226,0.5)); }

        /* Організатор */
        .section-title { font-size: 19px; font-weight: 800; margin-bottom: 16px; color: var(--text-main); }
        .organizer-card { display: flex; justify-content: space-between; align-items: center; padding-bottom: 24px; border-bottom: 1px solid var(--border-light); margin-bottom: 24px; }
        .org-left { display: flex; align-items: center; gap: 14px; }
        .org-avatar { width: 54px; height: 54px; border-radius: 50%; background-color: var(--border-light); background-size: cover; background-position: center; border: 1px solid var(--border-light); }
        .org-name { font-weight: 800; font-size: 17px; color: var(--text-main); }
        .org-rating { font-size: 14px; color: #ff9800; display: flex; align-items: center; gap: 4px; margin-top: 4px; font-weight: 600;}
        .org-badge { background: var(--brand-gradient); color: white; font-size: 12px; padding: 4px 10px; border-radius: 10px; font-weight: 700; }

        /* Опис */
        .description { font-size: 16px; color: #444; line-height: 1.5; margin-bottom: 30px; font-weight: 500; }

        /* Учасники */
        .participants { display: flex; align-items: center; gap: 12px; margin-bottom: 30px;}
        .avatars-group { display: flex; }
        .avatars-group img { width: 44px; height: 44px; border-radius: 50%; border: 3px solid var(--bg-light); margin-left: -12px; object-fit: cover; background-color: var(--border-light); }
        .avatars-group img:first-child { margin-left: 0; }
        .empty-slot { width: 44px; height: 44px; border-radius: 50%; border: 2px dashed #ccc; display: flex; justify-content: center; align-items: center; color: #aaa; margin-left: -12px; background: white;}
        .part-text { font-size: 14px; color: var(--text-muted); font-weight: 600; }

        /* ФІКСОВАНА КНОПКА ЗНИЗУ */
        .sticky-footer {
            position: fixed; bottom: 0; left: 0; right: 0; background: rgba(255,255,255,0.9);
            backdrop-filter: blur(15px); padding: 15px 20px 25px 20px; border-top: 1px solid var(--border-light); z-index: 100;
        }
        .btn-join {
            width: 100%; padding: 18px; border-radius: 20px; background: var(--brand-gradient);
            color: white; border: none; font-size: 17px; font-weight: 800; cursor: pointer;
            box-shadow: 0 8px 20px rgba(138, 43, 226, 0.3); transition: transform 0.1s; display: flex; justify-content: center; align-items: center; gap: 8px;
        }
        .btn-join:active { transform: scale(0.97); }
        .btn-join:disabled { background: var(--border-light); color: var(--text-muted); box-shadow: none; cursor: not-allowed; }
    </style>
</head>
<body>

    <div class="hero-image" id="ui-photo">
        <div class="top-actions">
            <div class="icon-btn" onclick="goBack()"><span class="material-symbols-rounded">arrow_back</span></div>
            <div class="icon-btn" onclick="shareEvent()"><span class="material-symbols-rounded">ios_share</span></div>
        </div>
    </div>

    <div class="content">
        <div class="tags" id="ui-tags">
            <div class="tag">Завантаження...</div>
        </div>
        <h1 id="ui-title">Завантаження...</h1>

        <div class="logistics-box">
            <div class="log-info">
                <div class="log-row">
                    <div class="log-icon"><span class="material-symbols-rounded" style="font-size:20px;">calendar_today</span></div>
                    <div id="ui-datetime">...</div>
                </div>
                <div class="log-row">
                    <div class="log-icon"><span class="material-symbols-rounded" style="font-size:20px;">location_on</span></div>
                    <div><span id="ui-location">...</span><br><span style="font-size:13px; color:var(--text-muted); font-weight:500;">Точна координата</span></div>
                </div>
            </div>
            <div class="mini-map-container" id="map-wrapper" style="display: none;">
                <div id="mini-map"></div>
            </div>
        </div>

        <h2 class="section-title">Організатор</h2>
        <div class="organizer-card">
            <div class="org-left">
                <div class="org-avatar" id="ui-org-photo"></div>
                <div>
                    <div class="org-name"><span id="ui-creator">...</span> <span class="material-symbols-rounded" style="color:#2196f3; font-size:18px; vertical-align:middle;">verified</span></div>
                    <div class="org-rating"><span class="material-symbols-rounded" style="font-size:16px;">star</span> 5.0 (Новачок)</div>
                </div>
            </div>
            <div class="org-badge">Findsy</div>
        </div>

        <h2 class="section-title">Про подію</h2>
        <div class="description" id="ui-desc">
            Завантаження інформації...
        </div>

        <h2 class="section-title" id="ui-capacity-title">Компанія</h2>
        <div class="participants">
            <div class="avatars-group" id="ui-avatars">
                </div>
            <div class="part-text" id="ui-needed-text">...</div>
        </div>

    </div>

    <div class="sticky-footer" id="footer-container">
        <button class="btn-join" id="join-btn" onclick="sendJoinRequest()"><span class="material-symbols-rounded">waving_hand</span> Долучитися</button>
    </div>

    <script>
        const tg = window.Telegram.WebApp;
        tg.ready(); tg.expand();
        tg.BackButton.show();
        tg.onEvent('backButtonClicked', goBack);

        function vibrate(style = 'light') { if (tg.HapticFeedback) { tg.HapticFeedback.impactOccurred(style); } }
        function goBack() { window.history.back(); }

        const myUserId = tg.initDataUnsafe?.user?.id || 0;
        
        const urlParams = new URLSearchParams(window.location.search);
        const eventId = urlParams.get('id');
        let currentEventTitle = "Крутий івент"; // Для шарінгу

        if (!eventId) {
            tg.showAlert("Помилка: Івент не знайдено");
            goBack();
        } else {
            fetchEventData();
        }

        // --- ЛОГІКА ПОШИРЕННЯ (SHARE) ---
        function shareEvent() {
            vibrate('light');
            // Формуємо текст і діплінк на твого бота
            const text = `Го зі мною на івент: ${currentEventTitle}!🔥`;
            // Формат діплінка: t.me/BotName/AppName?startapp=param
            const botUrl = `https://t.me/FindsyMasterBot/app?startapp=event_${eventId}`;
            
            // Відкриваємо нативне вікно Телеграму для вибору чату
            const shareUrl = `https://t.me/share/url?url=${encodeURIComponent(botUrl)}&text=${encodeURIComponent(text)}`;
            tg.openTelegramLink(shareUrl);
        }

        function fetchEventData() {
            fetch(`/api/events/${eventId}`)
                .then(r => r.json())
                .then(event => {
                    if (event.detail) {
                        tg.showAlert("Івент видалено або не існує.");
                        goBack(); return;
                    }

                    currentEventTitle = event.title || 'Без назви';

                    // 1. ФОТО ОБКЛАДИНКИ
                    const fallbackImg = 'https://images.unsplash.com/photo-1511886929837-354d827aae26?ixlib=rb-4.0.3&auto=format&fit=crop&w=800&q=80';
                    const bgImage = (event.photo && event.photo.startsWith('data:image')) ? event.photo : fallbackImg;
                    document.getElementById('ui-photo').style.backgroundImage = `url('${bgImage}')`;

                    // 2. ТЕКСТИ
                    document.getElementById('ui-title').innerText = currentEventTitle;
                    document.getElementById('ui-desc').innerText = event.description || 'Опис відсутній.';
                    document.getElementById('ui-creator').innerText = event.creator_name || 'Анонім';
                    
                    document.getElementById('ui-location').innerText = event.location || 'Локація не вказана';
                    if(event.date) {
                        const d = new Date(event.date);
                        document.getElementById('ui-datetime').innerText = d.toLocaleDateString('uk-UA', {weekday: 'short', day: '2-digit', month: 'long'}) + ', ' + d.toLocaleTimeString('uk-UA', {hour: '2-digit', minute:'2-digit'});
                    }

                    // 3. ІНІЦІАЛІЗАЦІЯ МІНІ-МАПИ (Якщо є координати)
                    if(event.location_lat && event.location_lon) {
                        document.getElementById('map-wrapper').style.display = 'block';
                        const miniMap = L.map('mini-map', { zoomControl: false, attributionControl: false, dragging: false, scrollWheelZoom: false, doubleClickZoom: false, touchZoom: false }).setView([event.location_lat, event.location_lon], 14);
                        L.tileLayer('https://{s}.basemaps.cartocdn.com/light_all/{z}/{x}/{y}{r}.png').addTo(miniMap);
                        
                        const penguinIcon = L.divIcon({ className: 'penguin-marker', html: `<img src="/img/penguin.png">`, iconSize: [30, 45], iconAnchor: [15, 45] });
                        L.marker([event.location_lat, event.location_lon], {icon: penguinIcon}).addTo(miniMap);
                    }

                    // 4. ТЯГНЕМО РЕАЛЬНЕ ФОТО ОРГАНІЗАТОРА
                    fetch(`/api/profile/${event.user_id}`)
                        .then(r => r.ok ? r.json() : null)
                        .then(orgData => {
                            if(orgData && orgData.photo) {
                                document.getElementById('ui-org-photo').style.backgroundImage = `url('${orgData.photo}')`;
                            } else {
                                document.getElementById('ui-org-photo').style.backgroundImage = `url('https://ui-avatars.com/api/?name=${event.creator_name}&background=8a2be2&color=fff')`;
                            }
                        });

                    // 5. ТЯГНЕМО РЕАЛЬНИХ УЧАСНИКІВ
                    const cap = event.capacity || 2;
                    let needed = event.needed_count !== undefined ? event.needed_count : cap;
                    
                    fetch(`/api/events/${eventId}/participants`)
                        .then(r => r.ok ? r.json() : [])
                        .then(participants => {
                            // Організатор завжди перший
                            let avatarsHtml = `<img src="${document.getElementById('ui-org-photo').style.backgroundImage.slice(5, -2)}" alt="Орг">`;
                            
                            // Малюємо заапрувлених учасників
                            participants.forEach(p => {
                                const pPhoto = p.photo || `https://ui-avatars.com/api/?name=${p.name || 'U'}&background=random`;
                                avatarsHtml += `<img src="${pPhoto}" alt="Учасник">`;
                            });

                            // Малюємо порожні слоти
                            for(let i = 0; i < needed; i++) {
                                avatarsHtml += `<div class="empty-slot"><span class="material-symbols-rounded" style="font-size:18px;">person_add</span></div>`;
                            }

                            document.getElementById('ui-avatars').innerHTML = avatarsHtml;
                            const taken = cap - needed;
                            document.getElementById('ui-capacity-title').innerText = `Компанія (${taken}/${cap})`;
                            document.getElementById('ui-needed-text').innerText = needed > 0 ? `Шукаємо ще ${needed} люд.` : "Місць немає";

                            // Оновлюємо теги
                            let tagsHtml = `<div class="tag">Відкрито</div>`;
                            if (needed === 1) tagsHtml += `<div class="tag hot">🔥 Останнє місце</div>`;
                            if (needed === 0) tagsHtml = `<div class="tag" style="background:#E5E5EA; color:#8E8E93;">❌ Місць немає</div>`;
                            document.getElementById('ui-tags').innerHTML = tagsHtml;
                        });

                    // 6. ЛОГІКА КНОПКИ (Приховуємо, якщо це мій івент)
                    if (event.user_id === myUserId) {
                        const footer = document.getElementById('footer-container');
                        footer.innerHTML = `<button class="btn-join" style="background: var(--bg-secondary); color: var(--text-main); box-shadow: none;" onclick="tg.showAlert('Тут буде редагування івенту')"><span class="material-symbols-rounded">settings</span> Це твій івент</button>`;
                    } else if (needed === 0) {
                        const btn = document.getElementById('join-btn');
                        btn.innerText = "Місць немає";
                        btn.disabled = true;
                    }
                })
                .catch(e => {
                    console.error(e);
                    tg.showAlert("Помилка зв'язку з сервером.");
                });
        }

        function sendJoinRequest() {
            vibrate('medium');
            const btn = document.getElementById('join-btn');
            btn.innerHTML = `<span class="material-symbols-rounded">hourglass_empty</span> Відправка...`;
            btn.disabled = true;

            fetch('/api/events/join', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ event_id: parseInt(eventId), user_id: myUserId })
            })
            .then(r => r.json())
            .then(data => {
                if(data.success) {
                    vibrate('success');
                    btn.innerHTML = `<span class="material-symbols-rounded">check_circle</span> Заявка відправлена`;
                    btn.style.background = "var(--success)";
                    btn.style.boxShadow = "0 8px 20px rgba(0, 230, 118, 0.3)";
                    tg.showAlert("Заявку надіслано! Організатор отримає повідомлення.");
                } else {
                    tg.showAlert(data.error || "Помилка відправки заявки.");
                    btn.innerHTML = `<span class="material-symbols-rounded">waving_hand</span> Долучитися`;
                    btn.disabled = false;
                }
            })
            .catch(e => {
                tg.showAlert("Помилка з'єднання.");
                btn.innerHTML = `<span class="material-symbols-rounded">waving_hand</span> Долучитися`;
                btn.disabled = false;
            });
        }
    </script>
</body>
</html>
