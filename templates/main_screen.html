<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Findsy - Головна</title>
    
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Rounded:opsz,wght,FILL,GRAD@24,600,1,0" />
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

    <style>
        :root { 
            --tg-theme-button-color: #8a2be2; 
            --findsy-gradient: linear-gradient(135deg, #8a2be2, #b026ff);
            --glass-bg: rgba(255, 255, 255, 0.95);
            --glass-border: rgba(0, 0, 0, 0.05);
            --text-main: #222222;
            --text-muted: #555555;
        }
        
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: -apple-system, BlinkMacSystemFont, Roboto, sans-serif; }
        body { overflow: hidden; background-color: #ffffff; }
        
        #map { height: 100vh; width: 100vw; position: absolute; top: 0; left: 0; z-index: 1; }
        
        /* Злегка знебарвлюємо мапу, щоб вона була ще білішою */
        .leaflet-layer { filter: grayscale(100%) opacity(0.8); }

        /* Фірмовий маркер Findsy */
        .findsy-pin {
            background: var(--findsy-gradient);
            width: 24px; height: 24px;
            border-radius: 50%;
            border: 3px solid white;
            box-shadow: 0 4px 10px rgba(138, 43, 226, 0.5);
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0% { box-shadow: 0 0 0 0 rgba(138, 43, 226, 0.4); }
            70% { box-shadow: 0 0 0 10px rgba(138, 43, 226, 0); }
            100% { box-shadow: 0 0 0 0 rgba(138, 43, 226, 0); }
        }

        .top-bar {
            position: absolute; top: 20px; left: 20px; right: 20px; z-index: 10;
            display: flex; justify-content: space-between; align-items: center;
        }
        
        .search-bar {
            background: var(--glass-bg); backdrop-filter: blur(10px);
            padding: 12px 20px; border-radius: 20px; display: flex; align-items: center; gap: 10px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.05); border: 1px solid var(--glass-border);
            flex-grow: 1; margin-right: 15px; color: var(--text-main); font-weight: 500;
        }

        .filter-btn {
            background: var(--glass-bg); backdrop-filter: blur(10px);
            width: 48px; height: 48px; border-radius: 50%; display: flex; align-items: center; justify-content: center;
            box-shadow: 0 4px 15px rgba(0,0,0,0.05); border: 1px solid var(--glass-border); color: var(--text-main);
        }

        /* Поп-ап івенту */
        .toast-popup {
            position: absolute; bottom: 100px; left: 20px; right: 20px; z-index: 10;
            background: var(--glass-bg); backdrop-filter: blur(10px);
            padding: 15px; border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1); border: 1px solid var(--glass-border);
            display: flex; gap: 15px; align-items: center;
            transform: translateY(150%); transition: transform 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }
        .toast-popup.active { transform: translateY(0); }
        .toast-img { width: 60px; height: 60px; border-radius: 12px; background: #ddd; object-fit: cover; }
        .toast-info { flex-grow: 1; }
        .toast-title { font-weight: 700; font-size: 16px; margin-bottom: 4px; color: var(--text-main); }
        .toast-meta { font-size: 13px; color: var(--text-muted); display: flex; align-items: center; gap: 4px; }
        .toast-btn { background: var(--findsy-gradient); color: white; border: none; padding: 8px 16px; border-radius: 12px; font-weight: 600; cursor: pointer; }

        /* Нижня навігація */
        .bottom-nav {
            position: absolute; bottom: 0; left: 0; right: 0; z-index: 10;
            background: var(--glass-bg); backdrop-filter: blur(10px); border-top: 1px solid var(--glass-border);
            display: flex; justify-content: space-around; align-items: center; padding: 15px 10px 25px 10px;
        }
        .nav-item { display: flex; flex-direction: column; align-items: center; gap: 4px; color: var(--text-muted); font-size: 11px; font-weight: 500; }
        .nav-item.active { color: var(--tg-theme-button-color); }
        .fab-wrapper { position: relative; width: 60px; display: flex; justify-content: center; }
        .fab {
            position: absolute; top: -45px; width: 60px; height: 60px; border-radius: 50%;
            background: var(--findsy-gradient); color: white; display: flex; align-items: center; justify-content: center;
            box-shadow: 0 8px 20px rgba(138, 43, 226, 0.4); border: 4px solid white; cursor: pointer;
        }
    </style>
</head>
<body>

    <div id="map"></div>

    <div class="top-bar">
        <div class="search-bar">
            <span class="material-symbols-rounded" style="color: var(--tg-theme-button-color);">search</span>
            Знайти івент...
        </div>
        <div class="filter-btn">
            <span class="material-symbols-rounded">tune</span>
        </div>
    </div>

    <div class="toast-popup" id="toast-popup">
        <img src="https://i.pravatar.cc/150?img=32" alt="Event" class="toast-img">
        <div class="toast-info">
            <div class="toast-title" id="popup-title">Теніс пара на пару</div>
            <div class="toast-meta">
                <span class="material-symbols-rounded" style="font-size: 14px;">schedule</span>
                Сьогодні, 19:00
            </div>
            <div class="toast-meta" style="margin-top: 4px;">
                <span class="material-symbols-rounded" style="font-size: 14px; color: #4caf50;">group</span>
                Шукають: 1 людину
            </div>
        </div>
        <button class="toast-btn" onclick="window.location.href='Details_of_event.html'">Деталі</button>
    </div>

    <div class="bottom-nav">
        <div class="nav-item active"><span class="material-symbols-rounded">map</span><span>Карта</span></div>
        <div class="nav-item" onclick="window.location.href='Strichka.html'"><span class="material-symbols-rounded">style</span><span>Стрічка</span></div>
        
        <div class="fab-wrapper">
            <div class="fab" onclick="window.location.href='createevent.html'">
                <span class="material-symbols-rounded" style="font-size: 32px;">add</span>
            </div>
        </div>

        <div class="nav-item" onclick="window.location.href='my_events.html'"><span class="material-symbols-rounded">inventory_2</span><span>Мої івенти</span></div>
        <div class="nav-item" onclick="window.location.href='my_contacts.html'"><span class="material-symbols-rounded">forum</span><span>Чати</span></div>
    </div>

    <script>
        // Ініціалізація карти (біла тема Positron)
        const map = L.map('map', { zoomControl: false }).setView([50.4501, 30.5234], 13);
        L.tileLayer('https://{s}.basemaps.cartocdn.com/light_all/{z}/{x}/{y}{r}.png', { 
            attribution: '© OpenStreetMap, © CartoDB', maxZoom: 19 
        }).addTo(map);

        // Кастомний маркер Findsy
        const findsyIcon = L.divIcon({ className: 'findsy-pin', iconSize: [24, 24], iconAnchor: [12, 12] });

        // Тестові івенти (будуть підтягуватись з БД)
        const marker1 = L.marker([50.4600, 30.5100], {icon: findsyIcon}).addTo(map);
        const marker2 = L.marker([50.4400, 30.5300], {icon: findsyIcon}).addTo(map);

        // Логіка Pop-up
        const popup = document.getElementById('toast-popup');
        
        marker1.on('click', () => {
            document.getElementById('popup-title').innerText = "Теніс пара на пару";
            popup.classList.add('active');
        });
        marker2.on('click', () => {
            document.getElementById('popup-title').innerText = "Мафія в центрі";
            popup.classList.add('active');
        });

        // Закрити попап при кліку на мапу
        map.on('click', () => { popup.classList.remove('active'); });

        // Ініціалізація Telegram
        const tg = window.Telegram.WebApp;
        tg.ready();
        tg.expand();
    </script>
</body>
</html>
