<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Findsy - Головна</title>

    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Rounded:opsz,wght,FILL,GRAD@24,600,1,0" />
    
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

    <style>
        /* Color System & Typography */
        :root {
            --brand-gradient: linear-gradient(135deg, #8a2be2, #ff267e);
            --bg-light: #F5F5F7;
            --text-main: #1C1C1E;
            --text-muted: #8E8E93;
            --success: #00E676; /* Неоновий зелений для місць */
            
            /* Glassmorphism для накладень на мапу */
            --glass-bg: rgba(255, 255, 255, 0.85);
            --glass-border: rgba(0, 0, 0, 0.08);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Inter', sans-serif; }
        body { overflow: hidden; background-color: var(--bg-light); color: var(--text-main); }

        /* Мапа */
        #map { height: 100vh; width: 100vw; position: absolute; top: 0; left: 0; z-index: 1; }
        .leaflet-layer { filter: grayscale(100%) opacity(0.85); } /* Робимо мапу ще чистішою */

        /* Верхній блок (Аватар + Пошук + Категорії) */
        .top-container {
            position: absolute; top: 15px; left: 15px; right: 15px; z-index: 10;
            display: flex; flex-direction: column; gap: 12px;
        }

        .header-row {
            display: flex; justify-content: space-between; align-items: center;
            background: var(--glass-bg); backdrop-filter: blur(12px); -webkit-backdrop-filter: blur(12px);
            padding: 10px 15px; border-radius: 24px; border: 1px solid var(--glass-border);
            box-shadow: 0 4px 20px rgba(0,0,0,0.05);
        }

        .user-info { display: flex; align-items: center; gap: 10px; }
        .avatar { width: 38px; height: 38px; border-radius: 50%; background: #ddd; object-fit: cover; border: 2px solid white; }
        .greeting { display: flex; flex-direction: column; }
        .greeting-text { font-size: 11px; color: var(--text-muted); font-weight: 600; text-transform: uppercase; letter-spacing: 0.5px; }
        .user-name { font-size: 16px; font-weight: 800; color: var(--text-main); text-transform: uppercase; } /* H1 Style */

        .search-btn {
            width: 38px; height: 38px; border-radius: 50%; background: rgba(138, 43, 226, 0.1);
            display: flex; align-items: center; justify-content: center; color: #8a2be2; cursor: pointer;
        }

        /* Пресети / Теги */
        .categories-wrapper {
            display: flex; gap: 8px; overflow-x: auto; padding-bottom: 5px; scrollbar-width: none;
        }
        .categories-wrapper::-webkit-scrollbar { display: none; }
        
        .chip {
            padding: 8px 16px; border-radius: 20px; font-size: 13px; font-weight: 600;
            background: var(--glass-bg); backdrop-filter: blur(12px); border: 1px solid var(--glass-border);
            color: var(--text-main); white-space: nowrap; cursor: pointer; transition: 0.2s ease;
        }
        .chip.active { background: var(--brand-gradient); color: white; border: none; box-shadow: 0 4px 12px rgba(138, 43, 226, 0.3); }

        /* Картка події (Pop-up) */
        .toast-popup {
            position: absolute; bottom: 105px; left: 15px; right: 15px; z-index: 10;
            background: var(--glass-bg); backdrop-filter: blur(16px); -webkit-backdrop-filter: blur(16px);
            padding: 16px; border-radius: 24px; box-shadow: 0 10px 40px rgba(0,0,0,0.12);
            border: 1px solid var(--glass-border); display: flex; flex-direction: column; gap: 14px;
            transform: translateY(150%); transition: transform 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }
        .toast-popup.active { transform: translateY(0); }

        .card-header-info { display: flex; gap: 12px; align-items: center; }
        .toast-img { width: 60px; height: 60px; border-radius: 16px; object-fit: cover; }
        .toast-info { flex-grow: 1; display: flex; flex-direction: column; gap: 4px; }
        .toast-title { font-weight: 600; font-size: 16px; color: var(--text-main); line-height: 1.2; }
        .toast-meta { font-size: 13px; color: var(--text-muted); display: flex; align-items: center; gap: 6px; font-weight: 500; }

        /* Прогрес бар заповненості (Success System Color) */
        .capacity-wrapper { display: flex; flex-direction: column; gap: 6px; }
        .capacity-labels { display: flex; justify-content: space-between; font-size: 11px; font-weight: 600; color: var(--text-muted); text-transform: uppercase; }
        .capacity-bar-bg { width: 100%; height: 6px; background: #E5E5EA; border-radius: 3px; overflow: hidden; }
        .capacity-bar-fill { height: 100%; background: var(--success); border-radius: 3px; }

        .join-btn {
            background: var(--brand-gradient); color: white; border: none; padding: 14px;
            border-radius: 16px; font-weight: 600; font-size: 15px; cursor: pointer; text-align: center;
            box-shadow: 0 4px 15px rgba(255, 38, 126, 0.25);
        }

        /* Нижня навігація (Bottom Tab Bar) */
        .bottom-nav {
            position: absolute; bottom: 0; left: 0; right: 0; z-index: 10;
            background: var(--glass-bg); backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px);
            border-top: 1px solid var(--glass-border);
            display: flex; justify-content: space-around; align-items: center; padding: 10px 10px 25px 10px;
        }
        .nav-item { display: flex; flex-direction: column; align-items: center; gap: 4px; color: var(--text-muted); font-size: 11px; font-weight: 600; cursor: pointer; }
        .nav-item.active { color: #8a2be2; }
        .nav-item .material-symbols-rounded { font-size: 24px; }

        .fab-wrapper { position: relative; width: 56px; display: flex; justify-content: center; }
        .fab {
            position: absolute; top: -35px; width: 56px; height: 56px; border-radius: 50%;
            background: var(--brand-gradient); color: white; display: flex; align-items: center; justify-content: center;
            box-shadow: 0 8px 20px rgba(255, 38, 126, 0.4); border: 4px solid var(--bg-light); cursor: pointer;
        }

        /* Фірмовий маркер на мапі */
        .findsy-pin {
            background: var(--brand-gradient); width: 28px; height: 28px; border-radius: 50%;
            border: 3px solid white; box-shadow: 0 4px 12px rgba(138, 43, 226, 0.5);
        }
    </style>
</head>
<body>

    <div id="map"></div>

    <div class="top-container">
        <div class="header-row">
            <div class="user-info">
                <img src="https://i.pravatar.cc/150?img=11" alt="Avatar" class="avatar" id="user-avatar">
                <div class="greeting">
                    <span class="greeting-text">Привіт,</span>
                    <span class="user-name" id="user-name-display">ГІСТЬ</span>
                </div>
            </div>
            <div class="search-btn" onclick="vibrate('light')">
                <span class="material-symbols-rounded">search</span>
            </div>
        </div>

        <div class="categories-wrapper">
            <div class="chip active" onclick="selectChip(this)">Всі двіжі</div>
            <div class="chip" onclick="selectChip(this)">🎾 Спорт</div>
            <div class="chip" onclick="selectChip(this)">🎲 Настілки</div>
            <div class="chip" onclick="selectChip(this)">💻 IT</div>
            <div class="chip" onclick="selectChip(this)">🍻 Тусовки</div>
        </div>
    </div>

    <div class="toast-popup" id="toast-popup">
        <div class="card-header-info">
            <img src="https://i.pravatar.cc/150?img=32" alt="Event" class="toast-img">
            <div class="toast-info">
                <div class="toast-title" id="popup-title">Теніс пара на пару</div>
                <div class="toast-meta">⏳ Сьогодні, 19:00</div>
                <div class="toast-meta">📍 Київ, Корти на Подолі</div>
            </div>
        </div>
        
        <div class="capacity-wrapper">
            <div class="capacity-labels">
                <span>Зібрано: 3/4</span>
                <span style="color: var(--success);">1 місце!</span>
            </div>
            <div class="capacity-bar-bg">
                <div class="capacity-bar-fill" style="width: 75%;"></div>
            </div>
        </div>

        <div class="join-btn" onclick="vibrate('medium'); window.location.href='Details_of_event.html'">
            Деталі події
        </div>
    </div>

    <div class="bottom-nav">
        <div class="nav-item active" onclick="vibrate('light')"><span class="material-symbols-rounded">map</span><span>Карта</span></div>
        <div class="nav-item" onclick="vibrate('light'); window.location.href='Strichka.html'"><span class="material-symbols-rounded">style</span><span>Стрічка</span></div>
        
        <div class="fab-wrapper">
            <div class="fab" onclick="vibrate('heavy'); window.location.href='createevent.html'">
                <span class="material-symbols-rounded" style="font-size: 32px;">add</span>
            </div>
        </div>

        <div class="nav-item" onclick="vibrate('light'); window.location.href='my_events.html'"><span class="material-symbols-rounded">inventory_2</span><span>Івенти</span></div>
        <div class="nav-item" onclick="vibrate('light'); window.location.href='my_contacts.html'"><span class="material-symbols-rounded">forum</span><span>Чати</span></div>
    </div>

    <script>
        // Ініціалізація Telegram
        const tg = window.Telegram.WebApp;
        tg.ready();
        tg.expand();

        // Haptics (Вібрація)
        function vibrate(style = 'light') {
            if (tg.HapticFeedback) {
                tg.HapticFeedback.impactOccurred(style);
            }
        }

        // Підтягування даних юзера з ТГ
        const user = tg.initDataUnsafe?.user;
        if (user) {
            document.getElementById('user-name-display').innerText = user.first_name || 'ГІСТЬ';
            if (user.photo_url) {
                document.getElementById('user-avatar').src = user.photo_url;
            }
        }

        // Логіка перемикання пресетів
        function selectChip(element) {
            vibrate('light');
            document.querySelectorAll('.chip').forEach(el => el.classList.remove('active'));
            element.classList.add('active');
        }

        // Ініціалізація карти (Positron)
        const map = L.map('map', { zoomControl: false }).setView([50.4501, 30.5234], 13);
        L.tileLayer('https://{s}.basemaps.cartocdn.com/light_all/{z}/{x}/{y}{r}.png', { 
            attribution: '© OpenStreetMap', maxZoom: 19 
        }).addTo(map);

        const findsyIcon = L.divIcon({ className: 'findsy-pin', iconSize: [28, 28], iconAnchor: [14, 14] });

        // Тестові маркери
        const marker1 = L.marker([50.4600, 30.5100], {icon: findsyIcon}).addTo(map);
        const marker2 = L.marker([50.4400, 30.5300], {icon: findsyIcon}).addTo(map);

        const popup = document.getElementById('toast-popup');
        
        marker1.on('click', () => {
            vibrate('medium');
            document.getElementById('popup-title').innerText = "Теніс пара на пару";
            popup.classList.add('active');
        });
        marker2.on('click', () => {
            vibrate('medium');
            document.getElementById('popup-title').innerText = "Мафія в центрі";
            popup.classList.add('active');
        });

        map.on('click', () => { popup.classList.remove('active'); });
    </script>
</body>
</html>
