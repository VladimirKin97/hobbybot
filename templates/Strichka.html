<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Findsy - Стрічка</title>
    
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Rounded:opsz,wght,FILL,GRAD@24,600,1,0" />

    <style>
        :root {
            --brand-main: #8a2be2;
            --brand-gradient: linear-gradient(135deg, #8a2be2, #ff267e);
            --bg-light: #F5F5F7;
            --text-main: #1C1C1E;
            --glass-bg: rgba(255, 255, 255, 0.85);
            --success: #00E676;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Inter', sans-serif; }
        body { background-color: var(--bg-light); height: 100vh; overflow: hidden; display: flex; flex-direction: column; }

        /* ВЕРХНЯ ПАНЕЛЬ */
        .header {
            padding: 15px 20px; display: flex; justify-content: space-between; align-items: center;
            z-index: 100;
        }
        .header h2 { font-size: 24px; font-weight: 800; color: var(--text-main); letter-spacing: -0.5px; }
        .filter-btn { background: var(--glass-bg); width: 42px; height: 42px; border-radius: 50%; display: flex; justify-content: center; align-items: center; box-shadow: 0 4px 10px rgba(0,0,0,0.05); color: var(--brand-main); }

        /* ПІДКАЗКА ДЛЯ СВАЙПУ (ОНБОРДИНГ) */
        .swipe-hint {
            position: absolute; top: 70px; left: 0; width: 100%; text-align: center;
            font-size: 13px; font-weight: 700; color: #8E8E93; text-transform: uppercase; letter-spacing: 1px;
            z-index: 50; transition: opacity 0.3s; pointer-events: none;
        }

        /* КОНТЕЙНЕР КАРТОК */
        .feed-container {
            flex: 1; position: relative; width: 100%; padding: 0 15px;
            display: flex; justify-content: center; align-items: center; perspective: 1000px;
        }

        .card {
            position: absolute; width: calc(100% - 30px); height: 82%;
            border-radius: 24px; overflow: hidden; box-shadow: 0 15px 35px rgba(0,0,0,0.15);
            transition: transform 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275), opacity 0.4s ease; 
            background-color: #333; background-size: cover; background-position: center;
            touch-action: none; /* Щоб екран не скролився під час перетягування */
            will-change: transform;
        }

        /* Імітація стопки карток */
        .card:nth-last-child(3) { transform: scale(0.9) translateY(25px); z-index: 1; opacity: 0.6; }
        .card:nth-last-child(2) { transform: scale(0.95) translateY(12px); z-index: 2; opacity: 0.8; }
        .card:nth-last-child(1) { transform: scale(1) translateY(0); z-index: 3; opacity: 1; box-shadow: 0 20px 40px rgba(138, 43, 226, 0.2); } /* Найвища картка */

        .card-overlay {
            position: absolute; bottom: 0; left: 0; width: 100%; height: 65%;
            background: linear-gradient(to top, rgba(0,0,0,0.95) 0%, rgba(0,0,0,0.7) 40%, rgba(0,0,0,0) 100%);
            display: flex; flex-direction: column; justify-content: flex-end; padding: 25px 20px; color: white;
            pointer-events: none; /* Щоб кліки проходили крізь градієнт */
        }

        /* Інформація на картці */
        .card-tags { display: flex; gap: 8px; margin-bottom: 12px; }
        .tag { background: rgba(255,255,255,0.25); backdrop-filter: blur(8px); padding: 6px 12px; border-radius: 14px; font-size: 13px; font-weight: 700; color: white; }
        .tag.hot { background: #ff267e; }

        .card-title { font-size: 28px; font-weight: 800; margin-bottom: 10px; line-height: 1.1; text-shadow: 0 2px 10px rgba(0,0,0,0.3); }
        .card-info-row { display: flex; align-items: center; gap: 6px; font-size: 15px; margin-bottom: 6px; color: #E5E5EA; font-weight: 500; }
        
        /* Кнопки дій */
        .actions {
            display: flex; justify-content: center; gap: 15px; margin-top: 20px; pointer-events: auto;
        }
        .action-btn {
            height: 60px; border-radius: 30px; border: none; display: flex; justify-content: center; align-items: center; cursor: pointer; box-shadow: 0 5px 15px rgba(0,0,0,0.2); transition: transform 0.1s; font-weight: 700; font-size: 16px; gap: 8px;
        }
        .action-btn:active { transform: scale(0.92); }
        .btn-skip { width: 60px; background: white; color: #ff267e; }
        .btn-like { flex-grow: 1; background: var(--brand-gradient); color: white; }

        /* Анімації змахування */
        .swipe-left { transform: translateX(-150%) rotate(-15deg) !important; opacity: 0 !important; }
        .swipe-right { transform: translateX(150%) rotate(15deg) !important; opacity: 0 !important; }

        .empty-state { text-align: center; color: #888; font-size: 18px; font-weight: 600; display: flex; flex-direction: column; align-items: center; gap: 10px; }

        /* НИЖНЄ МЕНЮ */
        .bottom-nav { position: absolute; bottom: 0; left: 0; right: 0; z-index: 100; background: var(--glass-bg); backdrop-filter: blur(20px); border-top: 1px solid rgba(0,0,0,0.08); display: flex; justify-content: space-around; align-items: center; padding: 10px 10px 25px 10px; }
        .nav-item { display: flex; flex-direction: column; align-items: center; gap: 4px; color: #8E8E93; font-size: 11px; font-weight: 600; cursor: pointer; }
        .nav-item.active { color: var(--brand-main); }
        .nav-item .material-symbols-rounded { font-size: 24px; }
        .fab-wrapper { position: relative; width: 56px; display: flex; justify-content: center; }
        .fab { position: absolute; top: -35px; width: 56px; height: 56px; border-radius: 50%; background: var(--brand-gradient); color: white; display: flex; align-items: center; justify-content: center; box-shadow: 0 8px 20px rgba(255, 38, 126, 0.4); border: 4px solid var(--bg-light); cursor: pointer; }
    </style>
</head>
<body>

    <div class="header">
        <h2>Findsy</h2>
        <div class="filter-btn" onclick="vibrate('light')"><span class="material-symbols-rounded">tune</span></div>
    </div>

    <div class="swipe-hint" id="swipeHint">👈 Пропустити &nbsp;&nbsp;•&nbsp;&nbsp; Хочу сюди 👉</div>

    <div class="feed-container" id="cardStack">
        <div class="empty-state" id="emptyState" style="display: none;">
            <span class="material-symbols-rounded" style="font-size: 48px; color: #ccc;">sentiment_dissatisfied</span>
            Івенти закінчилися 😢<br>Зайди пізніше або створи свій!
        </div>
        </div>

    <div class="bottom-nav">
        <div class="nav-item" onclick="vibrate('light'); window.location.href='main_screen.html'"><span class="material-symbols-rounded">map</span><span>Карта</span></div>
        <div class="nav-item active"><span class="material-symbols-rounded">style</span><span>Стрічка</span></div>
        <div class="fab-wrapper"><div class="fab" onclick="vibrate('heavy'); window.location.href='createevent.html'"><span class="material-symbols-rounded" style="font-size: 32px;">add</span></div></div>
        <div class="nav-item" onclick="vibrate('light'); window.location.href='my_events.html'"><span class="material-symbols-rounded">inventory_2</span><span>Івенти</span></div>
        <div class="nav-item" onclick="vibrate('light'); window.location.href='my_contacts.html'"><span class="material-symbols-rounded">forum</span><span>Чати</span></div>
    </div>

    <script>
        const tg = window.Telegram.WebApp;
        tg.ready(); tg.expand();

        function vibrate(style = 'light') { if (tg.HapticFeedback) { tg.HapticFeedback.impactOccurred(style); } }

        const cardStack = document.getElementById('cardStack');
        const emptyState = document.getElementById('emptyState');
        const swipeHint = document.getElementById('swipeHint');
        
        let hasSwiped = false; // Перевірка, чи юзер вже зрозумів як свайпати

        // 1. ЗАВАНТАЖУЄМО ІВЕНТИ
        fetch('/api/events')
            .then(res => res.json())
            .then(events => {
                if (!events || events.length === 0) {
                    emptyState.style.display = 'flex';
                    swipeHint.style.display = 'none';
                    return;
                }

                // Перевертаємо масив, щоб перший івент був ОСТАННІМ у DOM (тобто лежав зверху колоди)
                events.reverse().forEach(event => {
                    const fallbackImg = 'https://images.unsplash.com/photo-1511886929837-354d827aae26?ixlib=rb-4.0.3&auto=format&fit=crop&w=800&q=80';
                    const bgImage = (event.photo && event.photo.startsWith('data:image')) ? event.photo : fallbackImg;
                    
                    // Форматування дати
                    let timeStr = "Час не вказано";
                    if(event.date) {
                        const d = new Date(event.date);
                        timeStr = d.toLocaleDateString('uk-UA', {day: '2-digit', month: '2-digit'}) + ' о ' + d.toLocaleTimeString('uk-UA', {hour: '2-digit', minute:'2-digit'});
                    }

                    // Вираховуємо місця для тегу
                    const cap = event.capacity || 2;
                    const needed = event.needed_count !== undefined ? event.needed_count : cap;
                    let tagHtml = `<div class="tag">Відкрито</div>`;
                    if(needed === 1) {
                        tagHtml = `<div class="tag hot">🔥 Останнє місце!</div>`;
                    } else if (needed > 1) {
                        tagHtml = `<div class="tag">Шукають: ${needed} люд.</div>`;
                    }

                    const cardHtml = `
                        <div class="card" style="background-image: url('${bgImage}');" data-id="${event.id}">
                            <div class="card-overlay">
                                <div class="card-tags">${tagHtml}</div>
                                <div class="card-title">${event.title || 'Без назви'}</div>
                                <div class="card-info-row"><span class="material-symbols-rounded" style="font-size:18px">schedule</span> ${timeStr}</div>
                                <div class="card-info-row"><span class="material-symbols-rounded" style="font-size:18px">location_on</span> ${event.location || 'Локація не вказана'}</div>
                                <div class="card-info-row"><span class="material-symbols-rounded" style="font-size:18px">person</span> Орг: ${event.creator_name || 'Анонім'}</div>
                                
                                <div class="actions">
                                    <button class="action-btn btn-skip" onclick="swipe('left')"><span class="material-symbols-rounded" style="font-size: 30px">close</span></button>
                                    <button class="action-btn btn-like" onclick="swipe('right', ${event.id})"><span class="material-symbols-rounded">waving_hand</span> Хочу сюди</button>
                                </div>
                            </div>
                        </div>
                    `;
                    cardStack.insertAdjacentHTML('beforeend', cardHtml);
                });

                // Ініціалізуємо логіку перетягування для згенерованих карток
                initTinderSwipe();
            })
            .catch(err => {
                console.error("Помилка завантаження стрічки:", err);
                emptyState.style.display = 'flex';
                swipeHint.style.display = 'none';
            });

        // 2. ЛОГІКА КНОПОК
        window.swipe = function(direction, eventId = null) {
            const cards = document.querySelectorAll('.card');
            if (cards.length === 0) return;
            
            const topCard = cards[cards.length - 1]; // Беремо саму верхню картку

            // Ховаємо підказку після першої дії
            if(!hasSwiped) { swipeHint.style.opacity = '0'; hasSwiped = true; }

            if (direction === 'left') {
                vibrate('light');
                topCard.classList.add('swipe-left');
            } else {
                vibrate('success');
                topCard.classList.add('swipe-right');
                // Тут в майбутньому можна робити POST запит на бекенд, що юзер приєднався!
            }

            // Видаляємо картку з DOM після анімації
            setTimeout(() => {
                topCard.remove();
                if (document.querySelectorAll('.card').length === 0) {
                    emptyState.style.display = 'flex';
                }
            }, 400);
        };

        // 3. МАГІЯ ПЕРЕТЯГУВАННЯ ПАЛЬЦЕМ (Tinder-style)
        function initTinderSwipe() {
            let startX = 0, currentX = 0, isDragging = false;

            cardStack.addEventListener('touchstart', (e) => {
                const topCard = cardStack.lastElementChild;
                if (!topCard || !topCard.classList.contains('card')) return;
                
                // Переконуємось, що юзер не клікнув на кнопку
                if(e.target.closest('.action-btn')) return;

                startX = e.touches[0].clientX;
                isDragging = true;
                topCard.style.transition = 'none'; // Вимикаємо плавність, щоб картка йшла чітко за пальцем
            });

            cardStack.addEventListener('touchmove', (e) => {
                if (!isDragging) return;
                const topCard = cardStack.lastElementChild;
                if (!topCard || !topCard.classList.contains('card')) return;

                currentX = e.touches[0].clientX - startX;
                const rotate = currentX * 0.05; // Трохи нахиляємо картку під час руху
                
                // Ховаємо підказку
                if(!hasSwiped && Math.abs(currentX) > 20) { swipeHint.style.opacity = '0'; hasSwiped = true; }

                topCard.style.transform = `translateX(${currentX}px) rotate(${rotate}deg)`;
            });

            cardStack.addEventListener('touchend', (e) => {
                if (!isDragging) return;
                isDragging = false;
                
                const topCard = cardStack.lastElementChild;
                if (!topCard || !topCard.classList.contains('card')) return;

                topCard.style.transition = 'transform 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275), opacity 0.4s ease';

                // Якщо протягнув достатньо далеко — свайпаємо, інакше повертаємо в центр
                if (currentX > 100) {
                    swipe('right'); // Свайп вправо (Лайк)
                } else if (currentX < -100) {
                    swipe('left'); // Свайп вліво (Скіп)
                } else {
                    topCard.style.transform = ''; // Пружинить назад
                }
                currentX = 0;
            });
        }
    </script>
</body>
</html>
