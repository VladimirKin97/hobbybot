<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Findsy - Мій Профіль</title>
    
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Rounded:opsz,wght,FILL,GRAD@24,600,1,0" />

    <style>
        :root {
            --brand-main: #8a2be2;
            --brand-gradient: linear-gradient(135deg, #8a2be2, #ff267e);
            --bg-light: #F5F5F7;
            --bg-card: #FFFFFF;
            --text-main: #1C1C1E;
            --text-muted: #8E8E93;
            --input-border: #E5E5EA;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Inter', sans-serif; }
        body { background-color: var(--bg-light); color: var(--text-main); padding-bottom: 90px; }

        .header { background: var(--bg-card); padding: 30px 20px; text-align: center; border-bottom-left-radius: 30px; border-bottom-right-radius: 30px; box-shadow: 0 4px 15px rgba(0,0,0,0.03); position: relative; }
        .back-btn { position: absolute; top: 20px; left: 20px; width: 40px; height: 40px; border-radius: 50%; background: var(--bg-light); display: flex; justify-content: center; align-items: center; color: var(--text-main); cursor: pointer; }
        .edit-btn { position: absolute; top: 20px; right: 20px; width: 40px; height: 40px; border-radius: 50%; background: #f0e6ff; color: var(--brand-main); display: flex; justify-content: center; align-items: center; cursor: pointer; }
        
        .avatar-container { width: 100px; height: 100px; border-radius: 50%; margin: 0 auto 15px auto; padding: 4px; background: var(--brand-gradient); position: relative; }
        .avatar { width: 100%; height: 100%; border-radius: 50%; object-fit: cover; border: 3px solid white; background-color: #E5E5EA; }
        
        .name { font-size: 24px; font-weight: 800; margin-bottom: 4px; }
        .username { font-size: 15px; color: var(--text-muted); font-weight: 500; margin-bottom: 20px; }

        .stats-container { display: flex; justify-content: center; gap: 15px; margin-bottom: 10px; }
        .stat-box { background: var(--bg-light); padding: 12px 20px; border-radius: 20px; text-align: center; flex: 1; max-width: 140px; }
        .stat-num { font-size: 20px; font-weight: 800; color: var(--brand-main); }
        .stat-label { font-size: 12px; font-weight: 600; color: var(--text-muted); margin-top: 4px; }

        .section { background: var(--bg-card); padding: 20px; margin-top: 15px; border-radius: 20px; }
        .section-title { font-size: 18px; font-weight: 700; margin-bottom: 12px; display: flex; align-items: center; gap: 8px; }
        .bio-text { font-size: 15px; line-height: 1.5; color: var(--text-main); }
        
        .tags-container { display: flex; flex-wrap: wrap; gap: 8px; }
        .tag { padding: 8px 14px; background: #f0e6ff; color: var(--brand-main); border-radius: 20px; font-size: 14px; font-weight: 600; }

        /* Модалка редагування */
        .modal-overlay { position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: rgba(0,0,0,0.5); z-index: 100; display: none; align-items: flex-end; backdrop-filter: blur(5px); }
        .modal-content { background: var(--bg-card); width: 100%; border-top-left-radius: 24px; border-top-right-radius: 24px; padding: 24px; max-height: 85vh; overflow-y: auto; animation: slideUp 0.3s ease; }
        @keyframes slideUp { from { transform: translateY(100%); } to { transform: translateY(0); } }
        
        .modal-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; }
        .modal-title { font-size: 20px; font-weight: 800; }
        
        .input-group { margin-bottom: 16px; }
        .input-label { display: block; font-size: 13px; font-weight: 600; color: var(--text-muted); margin-bottom: 8px; }
        .custom-input { width: 100%; padding: 14px 16px; background: var(--bg-light); border: 1px solid var(--input-border); border-radius: 16px; font-size: 15px; color: var(--text-main); outline: none; transition: 0.2s; }
        .custom-input:focus { border-color: var(--brand-main); background: white; }
        textarea.custom-input { resize: none; height: 100px; }

        .btn-save { width: 100%; padding: 16px; background: var(--brand-gradient); color: white; border: none; border-radius: 16px; font-size: 17px; font-weight: 700; display: flex; justify-content: center; align-items: center; gap: 8px; margin-top: 10px; cursor: pointer; box-shadow: 0 8px 20px rgba(138, 43, 226, 0.3); }

        .photo-upload-area { width: 80px; height: 80px; border-radius: 50%; background: var(--bg-light); border: 2px dashed var(--brand-main); margin: 0 auto 20px auto; display: flex; justify-content: center; align-items: center; cursor: pointer; overflow: hidden; position: relative; }
        .photo-upload-area img { width: 100%; height: 100%; object-fit: cover; }
        .photo-upload-overlay { position: absolute; inset: 0; background: rgba(0,0,0,0.4); display: flex; justify-content: center; align-items: center; color: white; opacity: 0; transition: 0.2s; }
        .photo-upload-area:active .photo-upload-overlay { opacity: 1; }
    </style>
</head>
<body>

    <div class="header">
        <div class="back-btn" onclick="history.back()"><span class="material-symbols-rounded">arrow_back</span></div>
        <div class="edit-btn" onclick="openEditModal()"><span class="material-symbols-rounded" style="font-size: 20px;">edit</span></div>
        
        <div class="avatar-container">
            <img id="ui-avatar" src="https://ui-avatars.com/api/?name=U&background=E5E5EA&color=fff" class="avatar" alt="Avatar">
        </div>
        <h1 class="name" id="ui-name">Завантаження...</h1>
        <div class="username" id="ui-username">@username</div>

        <div class="stats-container">
            <div class="stat-box">
                <div class="stat-num" id="ui-org-count">0</div>
                <div class="stat-label">Організовано</div>
            </div>
            <div class="stat-box">
                <div class="stat-num" id="ui-part-count">0</div>
                <div class="stat-label">Відвідано</div>
            </div>
        </div>
    </div>

    <div class="section">
        <h3 class="section-title"><span class="material-symbols-rounded">person_book</span> Про мене</h3>
        <p class="bio-text" id="ui-bio">Немає опису. Натисніть редагувати, щоб додати інформацію про себе.</p>
    </div>

    <div class="section" style="margin-bottom: 30px;">
        <h3 class="section-title"><span class="material-symbols-rounded">favorite</span> Інтереси</h3>
        <div class="tags-container" id="ui-interests">
            </div>
    </div>

    <div class="modal-overlay" id="edit-modal">
        <div class="modal-content">
            <div class="modal-header">
                <h2 class="modal-title">Редагування</h2>
                <div class="back-btn" style="position:static; width:36px; height:36px; background:var(--bg-light);" onclick="closeEditModal()">
                    <span class="material-symbols-rounded" style="font-size:18px;">close</span>
                </div>
            </div>

            <div class="photo-upload-area" onclick="document.getElementById('file-input').click()">
                <img id="edit-photo-preview" src="https://ui-avatars.com/api/?name=U&background=E5E5EA&color=fff">
                <div class="photo-upload-overlay"><span class="material-symbols-rounded">photo_camera</span></div>
                <input type="file" id="file-input" style="display:none" accept="image/*" onchange="handlePhotoUpload(event)">
            </div>

            <div class="input-group">
                <label class="input-label">Ім'я</label>
                <input type="text" id="edit-name" class="custom-input" placeholder="Як до тебе звертатися?">
            </div>

            <div class="input-group">
                <label class="input-label">Про мене</label>
                <textarea id="edit-bio" class="custom-input" placeholder="Розкажи пару слів про себе..."></textarea>
            </div>

            <div class="input-group">
                <label class="input-label">Інтереси (через кому)</label>
                <input type="text" id="edit-interests" class="custom-input" placeholder="Теніс, Кава, Кіно">
            </div>

            <button class="btn-save" onclick="saveProfile()">
                <span class="material-symbols-rounded">check_circle</span>
                <span id="save-btn-text">Зберегти</span>
            </button>
        </div>
    </div>

    <script>
        const tg = window.Telegram.WebApp;
        tg.ready(); tg.expand();

        function vibrate(style = 'light') { if (tg.HapticFeedback) tg.HapticFeedback.impactOccurred(style); }

        // Якщо відкриваємо чийсь профіль (передано ID в URL) або свій
        const urlParams = new URLSearchParams(window.location.search);
        const urlId = urlParams.get('id');
        const myId = tg.initDataUnsafe?.user?.id || 1;
        const fetchId = urlId ? parseInt(urlId) : myId;
        const isMyProfile = (fetchId === myId);

        let currentEditPhotoBase64 = "";

        // Приховуємо кнопку редагування, якщо це чужий профіль
        if (!isMyProfile) {
            document.querySelector('.edit-btn').style.display = 'none';
        }

        function loadProfile() {
            fetch(`/api/profile/${fetchId}`)
                .then(r => r.json())
                .then(data => {
                    if (data.success) {
                        const tgUser = tg.initDataUnsafe?.user;
                        let photoUrl = data.photo;
                        let usernameStr = "";

                        // Якщо свій профіль, беремо актуальні дані з ТГ як бекап
                        if (isMyProfile && tgUser) {
                            if (!photoUrl && tgUser.photo_url) photoUrl = tgUser.photo_url;
                            if (tgUser.username) usernameStr = "@" + tgUser.username;
                        }

                        if (!photoUrl) photoUrl = `https://ui-avatars.com/api/?name=${data.name || 'U'}&background=8a2be2&color=fff`;
                        
                        document.getElementById('ui-avatar').src = photoUrl;
                        document.getElementById('ui-name').innerText = data.name || "Користувач";
                        document.getElementById('ui-username').innerText = usernameStr;
                        document.getElementById('ui-bio').innerText = data.bio || "Інформація відсутня.";
                        
                        // 🚀 ОСЬ ТУТ ПІДТЯГУЄТЬСЯ СТАТИСТИКА З БЕКЕНДУ
                        document.getElementById('ui-org-count').innerText = data.events_organized || 0;
                        document.getElementById('ui-part-count').innerText = data.events_joined || 0;

                        const tagsContainer = document.getElementById('ui-interests');
                        if (data.interests) {
                            const tags = data.interests.split(',').map(t => t.trim()).filter(t => t);
                            if (tags.length > 0) {
                                tagsContainer.innerHTML = tags.map(t => `<div class="tag">${t}</div>`).join('');
                            } else {
                                tagsContainer.innerHTML = `<span style="color:var(--text-muted); font-size:14px;">Не вказано</span>`;
                            }
                        } else {
                            tagsContainer.innerHTML = `<span style="color:var(--text-muted); font-size:14px;">Не вказано</span>`;
                        }

                        // Заповнюємо модалку редагування
                        document.getElementById('edit-name').value = data.name || "";
                        document.getElementById('edit-bio').value = data.bio || "";
                        document.getElementById('edit-interests').value = data.interests || "";
                        document.getElementById('edit-photo-preview').src = photoUrl;
                        currentEditPhotoBase64 = data.photo || ""; // Зберігаємо поточне фото
                    }
                });
        }

        loadProfile();

        function openEditModal() {
            vibrate('light');
            document.getElementById('edit-modal').style.display = 'flex';
        }

        function closeEditModal() {
            vibrate('light');
            document.getElementById('edit-modal').style.display = 'none';
        }

        function handlePhotoUpload(event) {
            const file = event.target.files[0];
            if (file) {
                const reader = new FileReader();
                reader.onload = function(e) {
                    const base64Data = e.target.result;
                    document.getElementById('edit-photo-preview').src = base64Data;
                    currentEditPhotoBase64 = base64Data;
                }
                reader.readAsDataURL(file);
            }
        }

        function saveProfile() {
            vibrate('medium');
            const saveBtn = document.getElementById('save-btn-text');
            saveBtn.innerText = "Збереження...";
            
            const updatedData = {
                telegram_id: fetchId,
                name: document.getElementById('edit-name').value.trim(),
                bio: document.getElementById('edit-bio').value.trim(),
                interests: document.getElementById('edit-interests').value.trim(),
                photo: currentEditPhotoBase64
            };

            fetch('/api/profile/update', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(updatedData)
            })
            .then(response => {
                if (response.ok) {
                    vibrate('success');
                    closeEditModal();
                    loadProfile(); 
                } else {
                    tg.showAlert("Помилка збереження.");
                }
            })
            .catch(err => {
                tg.showAlert("Помилка зв'язку з сервером.");
            })
            .finally(() => {
                saveBtn.innerText = "Зберегти";
            });
        }
    </script>
</body>
</html>
