<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Findsy - Мої івенти</title>
    
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Rounded:opsz,wght,FILL,GRAD@24,600,1,0" />

    <style>
        :root {
            --brand-main: #8a2be2;
            --brand-gradient: linear-gradient(135deg, #8a2be2, #ff267e);
            --bg-light: #F5F5F7;
            --bg-card: #FFFFFF;
            --text-main: #1C1C1E;
            --text-muted: #8E8E93;
            --border-light: #E5E5EA;
            --success: #00E676;
            --danger: #FF3B30;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Inter', sans-serif; }
        body { background-color: var(--bg-light); color: var(--text-main); padding-bottom: 100px; }

        .header { padding: 20px; background: var(--bg-light); position: sticky; top: 0; z-index: 10; border-bottom: 1px solid var(--border-light); }
        h1 { font-size: 26px; font-weight: 800; letter-spacing: -0.5px; }

        .tabs { display: flex; gap: 10px; margin-top: 15px; overflow-x: auto; padding-bottom: 5px; scrollbar-width: none; }
        .tabs::-webkit-scrollbar { display: none; }
        .tab { padding: 8px 16px; border-radius: 20px; font-weight: 600; font-size: 14px; background: var(--border-light); color: var(--text-muted); cursor: pointer; white-space: nowrap; transition: 0.2s; }
        .tab.active { background: var(--brand-main); color: white; box-shadow: 0 4px 10px rgba(138, 43, 226, 0.3); }

        .events-list { padding: 15px; display: flex; flex-direction: column; gap: 15px; }

        .event-card { background: var(--bg-card); border-radius: 24px; padding: 16px; box-shadow: 0 4px 15px rgba(0,0,0,0.03); display: flex; flex-direction: column; gap: 12px; }
        .card-top { display: flex; gap: 12px; align-items: center; }
        .card-img { width: 60px; height: 60px; border-radius: 16px; object-fit: cover; background: var(--border-light); }
        .card-info { flex-grow: 1; overflow: hidden; }
        .card-title { font-weight: 800; font-size: 16px; color: var(--text-main); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; margin-bottom: 4px; }
        .card-meta { font-size: 13px; color: var(--text-muted); display: flex; align-items: center; gap: 4px; font-weight: 500; }
        
        .card-actions { display: flex; gap: 8px; margin-top: 4px; }
        .btn-action { flex: 1; padding: 10px; border-radius: 12px; border: none; font-weight: 700; font-size: 13px; cursor: pointer; display: flex; justify-content: center; align-items: center; gap: 4px; }
        .btn-requests { background: var(--brand-main); color: white; }
        .btn-requests .badge { background: #ff267e; color: white; padding: 2px 6px; border-radius: 10px; font-size: 11px; margin-left: 4px; }
        .btn-outline { background: var(--bg-light); color: var(--text-main); border: 1px solid var(--border-light); }
        .btn-danger { background: #ffebee; color: var(--danger); }

        .status-badge { display: inline-block; padding: 4px 8px; border-radius: 8px; font-size: 11px; font-weight: 700; text-transform: uppercase; }
        .status-pending { background: #fff3e0; color: #ff9800; }
        .status-approved { background: #e8f5e9; color: var(--success); }

        /* Модалка заявок */
        .modal-overlay { position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: rgba(0,0,0,0.5); z-index: 200; display: none; align-items: flex-end; backdrop-filter: blur(5px); }
        .modal-sheet { background: var(--bg-card); width: 100%; max-height: 85vh; border-top-left-radius: 24px; border-top-right-radius: 24px; padding: 20px; overflow-y: auto; animation: slideUp 0.3s ease-out; }
        @keyframes slideUp { from { transform: translateY(100%); } to { transform: translateY(0); } }
        
        .req-item { border: 1px solid var(--border-light); border-radius: 16px; padding: 12px; margin-bottom: 12px; }
        .req-user { display: flex; align-items: center; gap: 10px; margin-bottom: 8px; }
        .req-avatar { width: 40px; height: 40px; border-radius: 50%; object-fit: cover; }
        .req-name { font-weight: 700; font-size: 15px; }
        .req-msg { font-size: 13px; color: #444; background: var(--bg-light); padding: 8px; border-radius: 8px; font-style: italic; margin-bottom: 12px; }
        .req-buttons { display: flex; gap: 8px; }
        .req-btn-acc { flex: 1; background: var(--success); color: white; padding: 8px; border-radius: 10px; border: none; font-weight: 600; cursor: pointer; }
        .req-btn-rej { flex: 1; background: var(--bg-light); color: var(--danger); padding: 8px; border-radius: 10px; border: 1px solid var(--danger); font-weight: 600; cursor: pointer; }

        .empty-state { text-align: center; padding: 40px 20px; color: var(--text-muted); }

        /* НИЖНЄ МЕНЮ */
        .bottom-nav { position: fixed; bottom: 0; left: 0; right: 0; z-index: 100; background: rgba(255,255,255,0.9); backdrop-filter: blur(20px); border-top: 1px solid var(--border-light); display: flex; justify-content: space-around; align-items: center; padding: 10px 10px 25px 10px; }
        .nav-item { display: flex; flex-direction: column; align-items: center; gap: 4px; color: var(--text-muted); font-size: 11px; font-weight: 600; cursor: pointer; }
        .nav-item.active { color: var(--brand-main); }
        .fab-wrapper { position: relative; width: 56px; display: flex; justify-content: center; }
        .fab { position: absolute; top: -35px; width: 56px; height: 56px; border-radius: 50%; background: var(--brand-gradient); color: white; display: flex; align-items: center; justify-content: center; box-shadow: 0 8px 20px rgba(138, 43, 226, 0.4); border: 4px solid var(--bg-light); cursor: pointer; }
    </style>
</head>
<body>

    <div class="header">
        <h1>Мої івенти</h1>
        <div class="tabs">
            <div class="tab active" onclick="switchTab('org', this)">Організовую</div>
            <div class="tab" onclick="switchTab('part', this)">Беру участь</div>
            <div class="tab" onclick="switchTab('hist', this)">Історія</div>
        </div>
    </div>

    <div class="events-list" id="events-container"></div>

    <div class="modal-overlay" id="requests-modal" onclick="if(event.target === this) closeRequests()">
        <div class="modal-sheet">
            <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px;">
                <h2 style="font-size: 20px; font-weight: 800;">Управління івентом</h2>
                <span class="material-symbols-rounded" style="cursor: pointer;" onclick="closeRequests()">close</span>
            </div>
            <div id="requests-list">Завантаження...</div>
        </div>
    </div>

    <div class="bottom-nav">
        <div class="nav-item" onclick="window.location.href='main_screen.html'"><span class="material-symbols-rounded">map</span><span>Карта</span></div>
        <div class="nav-item" onclick="window.location.href='Strichka.html'"><span class="material-symbols-rounded">style</span><span>Стрічка</span></div>
        <div class="fab-wrapper"><div class="fab" onclick="window.location.href='createevent.html'"><span class="material-symbols-rounded" style="font-size: 32px;">add</span></div></div>
        <div class="nav-item active"><span class="material-symbols-rounded">inventory_2</span><span>Івенти</span></div>
        <div class="nav-item" onclick="window.location.href='my_contacts.html'"><span class="material-symbols-rounded">forum</span><span>Контакти</span></div>
    </div>

    <script>
        const tg = window.Telegram.WebApp;
        tg.ready(); tg.expand();
        tg.BackButton.hide();

        function vibrate(style = 'light') { if (tg.HapticFeedback) tg.HapticFeedback.impactOccurred(style); }

        const myUserId = tg.initDataUnsafe?.user?.id || 0;
        let eventData = { organizer: [], participant: [], history: [] };

        function loadMyEvents() {
            fetch(`/api/users/${myUserId}/my_events`)
                .then(r => r.json())
                .then(data => {
                    eventData = data;
                    renderList('org');
                })
                .catch(e => console.error(e));
        }
        loadMyEvents();

        function switchTab(type, el) {
            vibrate('light');
            document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
            el.classList.add('active');
            renderList(type);
        }

        function renderList(type) {
            const container = document.getElementById('events-container');
            const list = eventData[type] || [];
            
            if (list.length === 0) {
                container.innerHTML = `<div class="empty-state">
                    <span class="material-symbols-rounded" style="font-size: 40px; margin-bottom: 10px;">inbox</span>
                    <p>Тут поки що порожньо.</p>
                </div>`;
                return;
            }

            let html = '';
            list.forEach(e => {
                const photo = e.photo || 'https://images.unsplash.com/photo-1511886929837-354d827aae26?ixlib=rb-4.0.3&auto=format&fit=crop&w=300&q=80';
                let dateStr = "Дата невідома";
                if(e.date) {
                    const d = new Date(e.date);
                    dateStr = d.toLocaleDateString('uk-UA', {day: '2-digit', month: 'short'}) + ' о ' + d.toLocaleTimeString('uk-UA', {hour: '2-digit', minute:'2-digit'});
                }

                html += `
                <div class="event-card">
                    <div class="card-top" onclick="window.location.href='Details_of_event.html?id=${e.id}'" style="cursor:pointer;">
                        <img src="${photo}" class="card-img" onerror="this.src='https://images.unsplash.com/photo-1511886929837-354d827aae26?ixlib=rb-4.0.3&auto=format&fit=crop&w=300&q=80'">
                        <div class="card-info">
                            <div class="card-title">${e.title}</div>
                            <div class="card-meta"><span class="material-symbols-rounded" style="font-size:14px;">calendar_today</span> ${dateStr}</div>
                            ${type === 'part' ? getStatusBadge(e.req_status) : ''}
                        </div>
                    </div>
                    <div class="card-actions">
                        ${getButtonsForType(type, e)}
                    </div>
                </div>`;
            });
            container.innerHTML = html;
        }

        function getStatusBadge(status) {
            if(status === 'approved') return `<div class="status-badge status-approved">Прийнято</div>`;
            if(status === 'pending') return `<div class="status-badge status-pending">На розгляді</div>`;
            return '';
        }

        function getButtonsForType(type, e) {
            if (type === 'org') {
                return `
                    <button class="btn-action btn-requests" onclick="openRequests(${e.id})">
                        Управління ${e.pending_count > 0 ? `<span class="badge">${e.pending_count}</span>` : ''}
                    </button>
                    <button class="btn-action btn-danger" onclick="deleteEvent(${e.id})"><span class="material-symbols-rounded" style="font-size:16px;">delete</span></button>
                `;
            }
            if (type === 'part' && e.req_status === 'approved') {
                return `
                    <button class="btn-action btn-outline" onclick="window.location.href='tg://user?id=${e.user_id}'"><span class="material-symbols-rounded" style="font-size:16px;">chat</span> Написати оргу</button>
                    <button class="btn-action btn-danger" onclick="leaveEvent(${e.id})"><span class="material-symbols-rounded" style="font-size:16px;">logout</span> Покинути</button>
                `;
            }
            return '';
        }

        function deleteEvent(eventId) {
            tg.showConfirm("Видалити цей івент? Учасники отримають сповіщення.", (ok) => {
                if(ok) {
                    fetch(`/api/events/${eventId}?user_id=${myUserId}`, { method: 'DELETE' }).then(() => loadMyEvents());
                }
            });
        }

        function leaveEvent(eventId) {
            tg.showConfirm("Точно хочеш покинути івент?", (ok) => {
                if(ok) {
                    fetch(`/api/events/${eventId}/leave`, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ user_id: myUserId })
                    }).then(() => loadMyEvents());
                }
            });
        }

        let currentManageEventId = null;

        function openRequests(eventId) {
            vibrate('medium');
            currentManageEventId = eventId;
            document.getElementById('requests-modal').style.display = 'flex';
            const list = document.getElementById('requests-list');
            list.innerHTML = 'Завантаження...';

            Promise.all([
                fetch(`/api/events/${eventId}/requests`).then(r => r.json()),
                fetch(`/api/events/${eventId}/participants`).then(r => r.json())
            ]).then(([reqs, parts]) => {
                let html = '';
                
                // Блок: Нові заявки
                if(reqs.length > 0) {
                    html += `<h3 style="font-size: 16px; margin-bottom: 12px; color: var(--text-muted);">Нові заявки:</h3>`;
                    reqs.forEach(r => {
                        const safeAvatar = (r.photo && r.photo.length > 10) ? r.photo : `https://ui-avatars.com/api/?name=${encodeURIComponent(r.name || 'User')}&background=8a2be2&color=fff`;
                        html += `
                        <div class="req-item" id="req-${r.seeker_id}">
                            <div class="req-user">
                                <img src="${safeAvatar}" class="req-avatar" onerror="this.src='https://ui-avatars.com/api/?name=U&background=ccc'">
                                <div class="req-name">${r.name || 'Анонім'}</div>
                            </div>
                            ${r.message ? `<div class="req-msg">"${r.message}"</div>` : ''}
                            <div class="req-buttons">
                                <button class="req-btn-acc" onclick="handleReq(${eventId}, ${r.seeker_id}, 'approved')">Прийняти</button>
                                <button class="req-btn-rej" onclick="handleReq(${eventId}, ${r.seeker_id}, 'rejected')">Відхилити</button>
                            </div>
                        </div>`;
                    });
                }

                // Блок: Вже прийняті учасники
                if(parts.length > 0) {
                    html += `<h3 style="font-size: 16px; margin: 20px 0 12px 0; color: var(--text-muted);">Вже в компанії:</h3>`;
                    parts.forEach(p => {
                        const safeAvatar = (p.photo && p.photo.length > 10) ? p.photo : `https://ui-avatars.com/api/?name=${encodeURIComponent(p.name || 'User')}&background=8a2be2&color=fff`;
                        html += `
                        <div class="req-item" style="display: flex; justify-content: space-between; align-items: center; padding: 10px 12px;">
                            <div class="req-user" style="margin-bottom: 0;">
                                <img src="${safeAvatar}" class="req-avatar" style="width: 36px; height: 36px;" onerror="this.src='https://ui-avatars.com/api/?name=U&background=ccc'">
                                <div class="req-name" style="font-size: 14px;">${p.name || 'Анонім'}</div>
                            </div>
                            <button class="req-btn-rej" style="flex: none; padding: 6px 12px; font-size: 13px;" onclick="kickUser(${eventId}, ${p.id})">Видалити</button>
                        </div>`;
                    });
                }

                if(reqs.length === 0 && parts.length === 0) {
                    html = '<div class="empty-state" style="padding: 20px 0;">Заявок та учасників поки немає.</div>';
                }

                list.innerHTML = html;
            });
        }

        function closeRequests() { 
            document.getElementById('requests-modal').style.display = 'none'; 
            loadMyEvents(); 
        }

        function handleReq(eventId, seekerId, status) {
            vibrate('light');
            document.getElementById(`req-${seekerId}`).style.opacity = '0.5';
            
            fetch('/api/events/requests/status', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ event_id: eventId, seeker_id: seekerId, status: status })
            }).then(() => {
                // Перемальовуємо модалку, щоб юзер миттєво перескочив у список "В компанії"
                openRequests(eventId);
                loadMyEvents();
            });
        }

        function kickUser(eventId, seekerId) {
            tg.showConfirm("Видалити учасника з івенту?", (ok) => {
                if(ok) {
                    vibrate('light');
                    fetch(`/api/events/${eventId}/kick`, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ user_id: myUserId, seeker_id: seekerId })
                    }).then(() => {
                        openRequests(eventId); // Оновлюємо модалку
                        loadMyEvents(); // Оновлюємо лічильники
                    });
                }
            });
        }
    </script>
</body>
</html>
