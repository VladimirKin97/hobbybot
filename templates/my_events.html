<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Findsy - Мої івенти</title>
    
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Rounded:opsz,wght,FILL,GRAD@24,600,1,0" />
    
    <style>
        :root { 
            --brand-gradient: linear-gradient(135deg, #8a2be2, #ff267e);
            --glass-bg: rgba(255, 255, 255, 0.85); 
        }
        
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: -apple-system, BlinkMacSystemFont, sans-serif; }
        body { background-color: #f5f5f7; color: #1C1C1E; padding-bottom: 90px; }

        .header { padding: 20px; background: white; border-bottom: 1px solid #eee; }
        .header h2 { font-size: 24px; font-weight: 800; margin-bottom: 15px; }

        .tabs { display: flex; gap: 10px; background: #eee; padding: 4px; border-radius: 12px; }
        .tab { flex: 1; text-align: center; padding: 10px; font-size: 14px; font-weight: 600; border-radius: 10px; cursor: pointer; color: #666; transition: 0.2s; }
        .tab.active { background: white; color: #8a2be2; box-shadow: 0 2px 5px rgba(0,0,0,0.05); }

        .tab-content { display: none; padding: 15px; animation: fadeIn 0.3s ease; }
        .tab-content.active { display: block; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(5px); } to { opacity: 1; transform: translateY(0); } }

        .list-card { background: white; border-radius: 16px; padding: 16px; margin-bottom: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.03); display: flex; flex-direction: column; gap: 12px; }
        .card-header { display: flex; justify-content: space-between; align-items: flex-start; }
        .card-title { font-size: 16px; font-weight: 700; margin-bottom: 4px; }
        
        .notification-badge { background: #ff3b30; color: white; padding: 4px 10px; border-radius: 20px; font-size: 12px; font-weight: 700; display: flex; align-items: center; gap: 4px; }
        .status-approved { background: #e8f5e9; color: #4caf50; padding: 5px 10px; border-radius: 8px; font-size: 12px; font-weight: 700; }

        .card-actions { display: flex; gap: 8px; border-top: 1px solid #eee; padding-top: 12px; }
        .btn-action { flex: 1; padding: 10px; border-radius: 10px; font-size: 14px; font-weight: 600; cursor: pointer; border: none; text-align: center; }
        .btn-primary { background: var(--brand-gradient); color: white; box-shadow: 0 4px 10px rgba(138, 43, 226, 0.2); }
        .btn-secondary { background: #f0f0f0; color: #333; }

        /* Універсальне нижнє меню */
        .bottom-nav { position: fixed; bottom: 0; left: 0; right: 0; z-index: 1000; background: var(--glass-bg); backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px); border-top: 1px solid rgba(0,0,0,0.08); display: flex; justify-content: space-around; align-items: center; padding: 10px 10px 25px 10px; }
        .nav-item { display: flex; flex-direction: column; align-items: center; gap: 4px; color: #8E8E93; font-size: 11px; font-weight: 600; cursor: pointer; }
        .nav-item.active { color: #8a2be2; }
        .nav-item .material-symbols-rounded { font-size: 24px; }
        .fab-wrapper { position: relative; width: 56px; display: flex; justify-content: center; }
        .fab { position: absolute; top: -35px; width: 56px; height: 56px; border-radius: 50%; background: var(--brand-gradient); color: white; display: flex; align-items: center; justify-content: center; box-shadow: 0 8px 20px rgba(255, 38, 126, 0.4); border: 4px solid #f5f5f7; cursor: pointer; }
    </style>
</head>
<body>

    <div class="header">
        <h2>Мої івенти</h2>
        <div class="tabs">
            <div class="tab active" onclick="switchTab('org')">Організатор</div>
            <div class="tab" onclick="switchTab('part')">Учасник</div>
            <div class="tab" onclick="switchTab('hist')">Історія</div>
        </div>
    </div>

    <div class="tab-content active" id="tab-org">
        <div class="list-card">
            <div class="card-header">
                <div>
                    <div class="card-title">Теніс пара на пару</div>
                    <div style="font-size: 13px; color: #777;">Сьогодні, 19:00</div>
                </div>
                <div class="notification-badge"><span class="material-symbols-rounded" style="font-size:14px">notifications_active</span> 2 заявки</div>
            </div>
            <div class="card-actions">
                <button class="btn-action btn-primary">Переглянути заявки</button>
            </div>
        </div>
    </div>

    <div class="tab-content" id="tab-part">
        <div class="list-card">
            <div class="card-header">
                <div>
                    <div class="card-title">Мафія в центрі</div>
                    <div style="font-size: 13px; color: #777;">Завтра, 18:00</div>
                </div>
                <div class="status-approved">Схвалено</div>
            </div>
            <div class="card-actions">
                <button class="btn-action btn-secondary" onclick="window.location.href='Details_of_event.html'">Деталі</button>
            </div>
        </div>
    </div>

    <div class="tab-content" id="tab-hist">
        <p style="text-align: center; color: #888; margin-top: 20px; font-weight: 500;">Історія порожня</p>
    </div>

    <div class="bottom-nav">
        <div class="nav-item" onclick="window.location.href='main_screen.html'"><span class="material-symbols-rounded">map</span><span>Карта</span></div>
        <div class="nav-item" onclick="window.location.href='Strichka.html'"><span class="material-symbols-rounded">style</span><span>Стрічка</span></div>
        <div class="fab-wrapper"><div class="fab" onclick="window.location.href='createevent.html'"><span class="material-symbols-rounded" style="font-size: 32px;">add</span></div></div>
        <div class="nav-item active" onclick="window.location.href='my_events.html'"><span class="material-symbols-rounded">inventory_2</span><span>Івенти</span></div>
        <div class="nav-item" onclick="window.location.href='my_contacts.html'"><span class="material-symbols-rounded">forum</span><span>Чати</span></div>
    </div>

    <script>
        function switchTab(tabId) {
            document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
            document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));
            
            event.target.classList.add('active');
            document.getElementById('tab-' + tabId).classList.add('active');
        }
    </script>
</body>
</html>
