<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Findsy - Мої івенти</title>
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Rounded:opsz,wght,FILL,GRAD@24,600,1,0" />
    <style>
        :root { --tg-theme-button-color: #8a2be2; --glass-bg: rgba(255, 255, 255, 0.9); }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: -apple-system, sans-serif; }
        body { background-color: #f5f5f5; color: #222; padding-bottom: 90px; }

        .header { padding: 20px; background: white; }
        .header h2 { font-size: 24px; font-weight: 800; margin-bottom: 15px; }

        .tabs { display: flex; gap: 10px; background: #eee; padding: 4px; border-radius: 12px; }
        .tab { flex: 1; text-align: center; padding: 10px; font-size: 14px; font-weight: 600; border-radius: 10px; cursor: pointer; color: #666; }
        .tab.active { background: white; color: var(--tg-theme-button-color); box-shadow: 0 2px 5px rgba(0,0,0,0.05); }

        .tab-content { display: none; padding: 15px; }
        .tab-content.active { display: block; }

        .list-card { background: white; border-radius: 16px; padding: 16px; margin-bottom: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.03); display: flex; flex-direction: column; gap: 12px; }
        .card-header { display: flex; justify-content: space-between; align-items: flex-start; }
        .card-title { font-size: 16px; font-weight: 700; margin-bottom: 4px; }
        
        .notification-badge { background: #ff3b30; color: white; padding: 4px 10px; border-radius: 20px; font-size: 12px; font-weight: 700; display: flex; align-items: center; gap: 4px; }
        .status-approved { background: #e8f5e9; color: #4caf50; padding: 5px 10px; border-radius: 8px; font-size: 12px; font-weight: 700; }

        .card-actions { display: flex; gap: 8px; border-top: 1px solid #eee; padding-top: 12px; }
        .btn-action { flex: 1; padding: 10px; border-radius: 10px; font-size: 14px; font-weight: 600; cursor: pointer; border: none; text-align: center; }
        .btn-primary { background: var(--tg-theme-button-color); color: white; }
        .btn-secondary { background: #f0f0f0; color: #333; }

        .bottom-nav { position: fixed; bottom: 0; left: 0; right: 0; background: var(--glass-bg); height: 75px; border-top-left-radius: 24px; border-top-right-radius: 24px; display: flex; justify-content: space-around; align-items: center; box-shadow: 0 -4px 20px rgba(0,0,0,0.05); padding: 0 10px 10px 10px; }
        .nav-item { display: flex; flex-direction: column; align-items: center; gap: 4px; color: #888; font-size: 11px; font-weight: 600; }
        .nav-item.active { color: var(--tg-theme-button-color); }
        .fab { position: relative; top: -15px; width: 60px; height: 60px; border-radius: 50%; background: linear-gradient(135deg, #8a2be2, #b026ff); color: white; display: flex; align-items: center; justify-content: center; box-shadow: 0 8px 20px rgba(138, 43, 226, 0.4); border: 4px solid white; }
    </style>
</head>
<body>

    <div class="header">
        <h2>Мої івенти</h2>
        <div class="tabs">
            <div class="tab active" onclick="switchTab('org')">Організатор</div>
            <div class="tab" onclick="switchTab('part')">Учасник</div>
            <div class="tab" onclick="switchTab('hist')">Історія</div>
        </div>
    </div>

    <div class="tab-content active" id="tab-org">
        <div class="list-card">
            <div class="card-header">
                <div>
                    <div class="card-title">Теніс пара на пару</div>
                    <div style="font-size: 13px; color: #777;">Сьогодні, 19:00</div>
                </div>
                <div class="notification-badge"><span class="material-symbols-rounded" style="font-size:14px">notifications_active</span> 2 заявки</div>
            </div>
            <div class="card-actions">
                <button class="btn-action btn-primary">Переглянути заявки</button>
            </div>
        </div>

            <div class="card-header">
                <div>
