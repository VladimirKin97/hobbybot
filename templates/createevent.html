<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Findsy - Створити івент</title>
    
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Rounded:opsz,wght,FILL,GRAD@24,600,1,0" />
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

    <style>
        :root {
            --tg-theme-bg-color: #ffffff;
            --tg-theme-text-color: #222222;
            --tg-theme-hint-color: #999999;
            --findsy-gradient: linear-gradient(135deg, #8a2be2, #b026ff);
            --bg-secondary: #f4f4f5;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: -apple-system, sans-serif; }
        body { background-color: var(--tg-theme-bg-color); color: var(--tg-theme-text-color); display: flex; flex-direction: column; height: 100vh; }

        .header { padding: 20px 20px 10px 20px; display: flex; flex-direction: column; gap: 15px; }
        .top-row { display: flex; align-items: center; gap: 15px; }
        .back-btn { background: var(--bg-secondary); border: none; width: 40px; height: 40px; border-radius: 50%; display: flex; align-items: center; justify-content: center; cursor: pointer; }
        h1 { font-size: 20px; font-weight: 700; }

        /* Прогрес бар */
        .progress-container { display: flex; gap: 5px; width: 100%; }
        .progress-bar { height: 4px; flex-grow: 1; background-color: var(--bg-secondary); border-radius: 2px; transition: background-color 0.3s; }
        .progress-bar.active { background: var(--findsy-gradient); }

        .content { flex-grow: 1; overflow-y: auto; padding: 20px; position: relative; }
        .step { display: none; animation: fadeIn 0.3s ease; }
        .step.active { display: block; }
        @keyframes fadeIn { from { opacity: 0; transform: translateX(10px); } to { opacity: 1; transform: translateX(0); } }

        .input-group { margin-bottom: 20px; }
        label { display: block; font-size: 14px; font-weight: 600; margin-bottom: 8px; color: var(--tg-theme-text-color); }
        input[type="text"], input[type="number"], input[type="datetime-local"], select, textarea {
            width: 100%; padding: 14px; border: 1px solid #e0e0e0; border-radius: 12px;
            font-size: 16px; background-color: var(--tg-theme-bg-color); color: var(--tg-theme-text-color); outline: none;
        }
        textarea { resize: none; height: 100px; }
        input:focus, select:focus, textarea:focus { border-color: #8a2be2; }

        /* Мапа */
        .map-container { width: 100%; height: 250px; border-radius: 12px; overflow: hidden; border: 1px solid #e0e0e0; margin-top: 10px; position: relative; }
        #event-map { width: 100%; height: 100%; }
        .map-hint { position: absolute; bottom: 10px; left: 50%; transform: translateX(-50%); background: rgba(0,0,0,0.6); color: white; padding: 6px 12px; border-radius: 20px; font-size: 12px; z-index: 1000; pointer-events: none; }

        .footer { padding: 20px; background: var(--tg-theme-bg-color); border-top: 1px solid #eee; }
        .btn-primary { width: 100%; padding: 16px; border-radius: 16px; background: var(--findsy-gradient); color: white; font-size: 16px; font-weight: 700; border: none; cursor: pointer; transition: transform 0.1s; }
        .btn-primary:active { transform: scale(0.98); }
        
        .preview-card { background: var(--bg-secondary); padding: 15px; border-radius: 12px; margin-top: 20px; }
    </style>
</head>
<body>

    <div class="header">
        <div class="top-row">
            <button class="back-btn" id="btn-back" style="display:none;"><span class="material-symbols-rounded">arrow_back</span></button>
            <h1>Створити івент</h1>
        </div>
        <div class="progress-container">
            <div class="progress-bar active" id="pb-1"></div>
            <div class="progress-bar" id="pb-2"></div>
            <div class="progress-bar" id="pb-3"></div>
            <div class="progress-bar" id="pb-4"></div>
        </div>
    </div>

    <form id="event-form" action="/api/create_event" method="POST" style="display: none;">
        <input type="hidden" name="title" id="form-title">
        <input type="hidden" name="description" id="form-description">
        <input type="hidden" name="datetime" id="form-datetime">
        <input type="hidden" name="city" id="form-city">
        <input type="hidden" name="lat" id="form-lat">
        <input type="hidden" name="lon" id="form-lon">
        <input type="hidden" name="capacity" id="form-capacity">
        <input type="hidden" name="needed" id="form-needed">
    </form>

    <div class="content">
        <div class="step active" id="step-1">
            <div class="input-group">
                <label>Назва події</label>
                <input type="text" id="ui-title" placeholder="Наприклад: Гра в теніс">
            </div>
            <div class="input-group">
                <label>Опис</label>
                <textarea id="ui-description" placeholder="Розкажи деталі: рівень гри, що брати з собою..."></textarea>
            </div>
            <div class="input-group">
                <label>Дата та час початку</label>
                <input type="datetime-local" id="ui-datetime">
            </div>
        </div>

        <div class="step" id="step-2">
            <div class="input-group">
                <label>Місто</label>
                <select id="ui-city">
                    <option value="Київ">Київ</option>
                    <option value="Дніпро">Дніпро</option>
                    <option value="Львів">Львів</option>
                    <option value="Одеса">Одеса</option>
                    <option value="Харків">Харків</option>
                </select>
            </div>
            <div class="input-group">
                <label>Точка на мапі (перетягни маркер)</label>
                <div class="map-container">
                    <div id="event-map"></div>
                    <div class="map-hint">Посунь мапу, щоб вказати місце</div>
                </div>
            </div>
        </div>

        <div class="step" id="step-3">
            <div class="input-group">
                <label>Місткість (всього людей)</label>
                <input type="number" id="ui-capacity" placeholder="Наприклад: 4" min="2">
            </div>
            <div class="input-group">
                <label>Скільки ще шукаємо?</label>
                <input type="number" id="ui-needed" placeholder="Наприклад: 2" min="1">
            </div>
        </div>

        <div class="step" id="step-4">
            <h2 style="font-size: 18px; margin-bottom: 10px;">Перевірка даних</h2>
            <p style="color: var(--tg-theme-hint-color); font-size: 14px;">Так твій івент будуть бачити інші:</p>
            <div class="preview-card">
                <h3 id="preview-title" style="margin-bottom: 5px;">Назва івенту</h3>
                <div style="font-size: 14px; color: var(--text-muted); margin-bottom: 10px;" id="preview-meta">Київ • 10.10.2025 19:00</div>
                <div style="font-size: 14px;" id="preview-desc">Опис...</div>
            </div>
        </div>
    </div>

    <div class="footer">
        <button class="btn-primary" id="btn-next">Далі</button>
    </div>

    <script>
        let currentStep = 1;
        const totalSteps = 4;
        const btnNext = document.getElementById('btn-next');
        const btnBack = document.getElementById('btn-back');
        
        // Змінні для мапи
        let map, marker;
        let selectedLat = 50.4501; // Дефолт Київ
        let selectedLon = 30.5234;

        function updateUI() {
            document.querySelectorAll('.step').forEach(el => el.classList.remove('active'));
            document.getElementById(`step-${currentStep}`).classList.add('active');

            for(let i = 1; i <= totalSteps; i++) {
                document.getElementById(`pb-${i}`).classList.toggle('active', i <= currentStep);
            }

            btnBack.style.display = currentStep === 1 ? 'none' : 'flex';

            // Ініціалізація мапи на 2-му кроці
            if (currentStep === 2) {
                if (!map) {
                    map = L.map('event-map').setView([selectedLat, selectedLon], 12);
                    L.tileLayer('https://{s}.basemaps.cartocdn.com/light_all/{z}/{x}/{y}{r}.png').addTo(map);
                    
                    const pinIcon = L.divIcon({ className: 'findsy-pin', iconSize: [24, 24] });
                    // Маркер завжди по центру мапи
                    marker = L.marker([selectedLat, selectedLon], {icon: pinIcon}).addTo(map);
                    
                    // При русі мапи маркер залишається в центрі
                    map.on('move', function () {
                        marker.setLatLng(map.getCenter());
                    });
                    map.on('moveend', function () {
                        selectedLat = map.getCenter().lat;
                        selectedLon = map.getCenter().lng;
                    });
                }
                setTimeout(() => map.invalidateSize(), 200); // Обов'язково для Leaflet у прихованих div
            }

            // Заповнення прев'ю на 4-му кроці
            if (currentStep === totalSteps) {
                btnNext.innerHTML = '🚀 Опублікувати';
                document.getElementById('preview-title').innerText = document.getElementById('ui-title').value || 'Без назви';
                const city = document.getElementById('ui-city').value;
                const dt = document.getElementById('ui-datetime').value.replace('T', ' ');
                document.getElementById('preview-meta').innerText = `${city} • ${dt || 'Дата не обрана'}`;
                document.getElementById('preview-desc').innerText = document.getElementById('ui-description').value || 'Без опису';
            } else {
                btnNext.innerHTML = 'Далі';
            }
        }

        btnNext.addEventListener('click', () => {
            if (currentStep < totalSteps) {
                currentStep++;
                updateUI();
            } else {
                // Синхронізуємо візуальні інпути з прихованою формою перед відправкою
                document.getElementById('form-title').value = document.getElementById('ui-title').value;
                document.getElementById('form-description').value = document.getElementById('ui-description').value;
                document.getElementById('form-datetime').value = document.getElementById('ui-datetime').value;
                document.getElementById('form-city').value = document.getElementById('ui-city').value;
                document.getElementById('form-lat').value = selectedLat;
                document.getElementById('form-lon').value = selectedLon;
                document.getElementById('form-capacity').value = document.getElementById('ui-capacity').value;
                document.getElementById('form-needed').value = document.getElementById('ui-needed').value;
                
                // В реальному флоу тут буде form.submit(), але поки показуємо успіх
                const tg = window.Telegram.WebApp;
                tg.showAlert("Івент створено! Координати: " + selectedLat.toFixed(4) + ", " + selectedLon.toFixed(4));
                // document.getElementById('event-form').submit(); // Розкоментуємо, коли підключимо API
            }
        });

        btnBack.addEventListener('click', () => {
            if (currentStep > 1) { currentStep--; updateUI(); }
        });

        window.Telegram.WebApp.ready();
    </script>
    <style>
        .findsy-pin { background: var(--findsy-gradient); border-radius: 50%; border: 3px solid white; box-shadow: 0 4px 10px rgba(138,43,226,0.5); }
    </style>
</body>
</html>
