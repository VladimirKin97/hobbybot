<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Створити двіж - Findsy</title>

    <script src="https://telegram.org/js/telegram-web-app.js"></script>

    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Rounded:opsz,wght,FILL,GRAD@24,600,1,0" />

    <style>
        :root {
            --tg-theme-button-color: #8a2be2;
            --text-main: #ffffff;
            --bg-main: #0A0A12;
            --input-bg: #15151E;
        }
        body {
            background-color: var(--bg-main);
            color: var(--text-main);
            font-family: -apple-system, BlinkMacSystemFont, Roboto, sans-serif;
            margin: 0; padding: 0;
        }

        /* 💡 РОБИМО МАПУ СВІТЛІШОЮ */
        .leaflet-tile {
            filter: brightness(1.4) contrast(0.9); /* Можеш змінювати 1.4 на 1.5 чи 1.2, якщо треба ще світліше/темніше */
        }

        /* Шапка з кнопкою НАЗАД */
        .header {
            display: flex; align-items: center; padding: 15px;
            background-color: var(--bg-main); position: sticky; top: 0; z-index: 1000;
            border-bottom: 1px solid rgba(255,255,255,0.1);
        }
        .back-btn {
            background: none; border: none; color: var(--text-main);
            display: flex; align-items: center; font-size: 16px; font-weight: 600;
            cursor: pointer; gap: 5px; text-decoration: none;
        }

        /* Контейнер форми */
        .form-container { padding: 20px 15px; padding-bottom: 80px; }

        /* Елементи форми */
        label { display: block; font-weight: 600; margin-bottom: 8px; color: #ccc; font-size: 14px;}
        
        input[type="text"], input[type="number"] {
            width: 100%; padding: 12px 15px; margin-bottom: 20px;
            border-radius: 12px; border: 1px solid rgba(255,255,255,0.2);
            background-color: var(--input-bg); color: white;
            font-size: 16px; box-sizing: border-box; outline: none;
        }
        input:focus { border-color: var(--tg-theme-button-color); }

        /* Контейнер для мапи */
        #create-map { 
            width: 100%; height: 250px; border-radius: 16px; 
            margin-bottom: 20px; border: 1px solid rgba(255,255,255,0.2); z-index: 1; 
        }

        /* Кнопка "Створити" */
        .submit-btn {
            width: 100%; padding: 15px; border-radius: 16px; border: none;
            background: linear-gradient(135deg, #8a2be2, #FF1493); color: white;
            font-size: 16px; font-weight: bold; cursor: pointer;
            box-shadow: 0 4px 15px rgba(138, 43, 226, 0.4); margin-top: 10px;
        }

        /* Наш кастомний пін */
        .findsy-pin {
            background: linear-gradient(135deg, #8A2BE2, #FF1493);
            border-radius: 50%; border: 2px solid white;
            box-shadow: 0 0 10px #8A2BE2;
        }
    </style>
</head>
<body>

    <div class="header">
        <a href="/" class="back-btn">
            <span class="material-symbols-rounded">arrow_back_ios_new</span> Назад
        </a>
    </div>

    <div class="form-container">
        <h2 style="margin-bottom: 20px;">Створити двіж 🐧</h2>

        <form action="/create_event" method="POST">
            <label>Назва події:</label>
            <input type="text" name="title" placeholder="Напр. Катання на ковзанах" required>

            <label>Скільки людей всього? (Місткість)</label>
            <input type="number" name="capacity" placeholder="Напр. 4" required>

            <label>Скільки ще потрібно знайти?</label>
            <input type="number" name="needed_count" placeholder="Напр. 2" required>

            <label>Де буде двіж? (Постав крапку на мапі):</label>
            <div id="create-map"></div>

            <input type="hidden" id="location_lat" name="location_lat" required>
            <input type="hidden" id="location_lon" name="location_lon" required>

            <button type="submit" class="submit-btn">Опублікувати івент</button>
        </form>
    </div>

    <script>
        // Ініціалізація Telegram
        let tg = window.Telegram.WebApp;
        tg.expand();

        // Ініціалізація мапи
        var map = L.map('create-map').setView([50.4501, 30.5234], 12);

        // Підключення мапи
        L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png', {
            maxZoom: 19,
            attribution: '© OpenStreetMap, © CartoDB'
        }).addTo(map);

        // 🛠 Фікс: Змушуємо мапу перерахувати свій розмір, щоб кліки працювали коректно
        setTimeout(function() { 
            map.invalidateSize(); 
        }, 500);

        var marker = null;

        // Дизайн піна
        var findsyPin = L.divIcon({
            className: 'findsy-pin',
            iconSize: [24, 24],
            iconAnchor: [12, 12]
        });

        // Логіка кліку по мапі
        map.on('click', function(e) {
            var lat = e.latlng.lat;
            var lon = e.latlng.lng;

            if (marker) {
                marker.setLatLng(e.latlng); // Якщо вже є - пересуваємо
            } else {
                marker = L.marker(e.latlng, {icon: findsyPin}).addTo(map); // Якщо немає - створюємо
            }

            // Передаємо координати у форму
            document.getElementById('location_lat').value = lat;
            document.getElementById('location_lon').value = lon;
        });
    </script>
</body>
</html>
