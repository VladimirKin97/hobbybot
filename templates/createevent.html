<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Findsy - Створити івент</title>
    
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Rounded:opsz,wght,FILL,GRAD@24,600,1,0" />

    <style>
        :root {
            --tg-theme-bg-color: #ffffff;
            --tg-theme-text-color: #222222;
            --tg-theme-hint-color: #999999;
            --tg-theme-button-color: #8a2be2;
            --bg-secondary: #f4f4f5;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; }
        body { background-color: var(--tg-theme-bg-color); color: var(--tg-theme-text-color); display: flex; flex-direction: column; height: 100vh; }

        /* Шапка з прогресом */
        .header { padding: 20px 20px 10px 20px; text-align: center; border-bottom: 1px solid #eee; }
        .header h2 { font-size: 18px; font-weight: 700; margin-bottom: 15px; }
        
        .progress-container { display: flex; gap: 5px; width: 100%; }
        .progress-bar { height: 4px; flex: 1; background-color: #eee; border-radius: 2px; transition: 0.3s; }
        .progress-bar.active { background-color: var(--tg-theme-button-color); }

        /* Контейнер кроків */
        .steps-container { flex: 1; padding: 20px; overflow-y: auto; }
        .step { display: none; animation: fadeIn 0.3s ease; }
        .step.active { display: block; }

        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        /* Елементи форм */
        .form-group { margin-bottom: 20px; }
        .form-group label { display: block; font-size: 14px; font-weight: 600; margin-bottom: 8px; color: #444; }
        .form-group p.hint { font-size: 12px; color: var(--tg-theme-hint-color); margin-bottom: 8px; line-height: 1.4; }
        
        input, textarea, select {
            width: 100%; padding: 14px; border: 1px solid #ddd; border-radius: 12px;
            font-size: 16px; background-color: var(--bg-secondary); color: var(--tg-theme-text-color);
            outline: none; transition: 0.2s;
        }
        input:focus, textarea:focus { border-color: var(--tg-theme-button-color); background-color: #fff; box-shadow: 0 0 0 3px rgba(138, 43, 226, 0.1); }
        textarea { resize: none; height: 100px; }

        /* Фото аплоад */
        .photo-upload {
            width: 100%; height: 150px; border: 2px dashed #ccc; border-radius: 16px;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            color: var(--tg-theme-hint-color); cursor: pointer; background-color: var(--bg-secondary);
        }
        .photo-upload .material-symbols-rounded { font-size: 40px; margin-bottom: 10px; color: #8a2be2; }

        /* Нижні кнопки */
        .footer { padding: 20px; background: white; border-top: 1px solid #eee; display: flex; gap: 10px; }
        .btn {
            flex: 1; padding: 16px; border-radius: 14px; font-size: 16px; font-weight: 700;
            cursor: pointer; border: none; display: flex; justify-content: center; align-items: center; transition: 0.2s;
        }
        .btn-secondary { background-color: var(--bg-secondary); color: #555; flex: 0.4; }
        .btn-primary { background-color: var(--tg-theme-button-color); color: white; box-shadow: 0 4px 15px rgba(138, 43, 226, 0.3); }
        .btn-primary:active { transform: scale(0.98); }
        
        .hidden { display: none !important; }
        
        /* Карточка прев'ю */
        .preview-card { border: 1px solid #eee; border-radius: 16px; padding: 15px; box-shadow: 0 5px 15px rgba(0,0,0,0.05); }
        .preview-title { font-size: 18px; font-weight: 800; margin-bottom: 10px; text-transform: uppercase; }
        .preview-row { display: flex; align-items: center; gap: 8px; margin-bottom: 8px; font-size: 14px; color: #555; }
    </style>
</head>
<body>

    <div class="header">
        <h2>Створити подію</h2>
        <div class="progress-container">
            <div class="progress-bar active" id="pb-1"></div>
            <div class="progress-bar" id="pb-2"></div>
            <div class="progress-bar" id="pb-3"></div>
            <div class="progress-bar" id="pb-4"></div>
            <div class="progress-bar" id="pb-5"></div>
        </div>
    </div>

    <div class="steps-container">
        
        <div class="step active" id="step-1">
            <div class="form-group">
                <label>Назва події</label>
                <input type="text" placeholder="Напр. Гра в теніс на вихідних" id="in-title">
            </div>
            <div class="form-group">
                <label>Опис</label>
                <p class="hint">Розкажи деталі: що брати з собою, який рівень підготовки потрібен.</p>
                <textarea placeholder="Шукаю партнера для гри..."></textarea>
            </div>
        </div>

        <div class="step" id="step-2">
            <div class="form-group">
                <label>Дата та Час</label>
                <input type="datetime-local">
            </div>
            <div class="form-group">
                <label>Місто</label>
                <select>
                    <option>Київ</option>
                    <option>Львів</option>
                    <option>Одеса</option>
                </select>
            </div>
            <div class="form-group">
                <label>Точна локація (Адреса)</label>
                <input type="text" placeholder="Парк Наталка, Оболонь">
            </div>
        </div>

        <div class="step" id="step-3">
            <div class="form-group">
                <label>Скільки людей має бути всього?</label>
                <p class="hint">Включно з тобою.</p>
                <input type="number" placeholder="Напр. 4">
            </div>
            <div class="form-group">
                <label>Скільки ще шукаєш (вільних місць)?</label>
                <input type="number" placeholder="Напр. 2">
            </div>
        </div>

        <div class="step" id="step-4">
            <div class="form-group">
                <label>Фото події</label>
                <p class="hint">Яскраве фото привертає на 50% більше уваги!</p>
                <div class="photo-upload">
                    <span class="material-symbols-rounded">add_a_photo</span>
                    <span>Натисни, щоб обрати</span>
                </div>
            </div>
        </div>

        <div class="step" id="step-5">
            <h3 style="margin-bottom: 15px; font-size: 16px;">Готово! Перевір картку:</h3>
            <div class="preview-card">
                <div class="preview-title" id="out-title">ТВІЙ ІВЕНТ</div>
                <div class="preview-row"><span class="material-symbols-rounded" style="font-size:18px">schedule</span> Дата і час обрані</div>
                <div class="preview-row"><span class="material-symbols-rounded" style="font-size:18px">location_on</span> Локація обрана</div>
                <div class="preview-row"><span class="material-symbols-rounded" style="font-size:18px">group</span> Місця налаштовані</div>
            </div>
        </div>

    </div>

    <div class="footer">
        <button class="btn btn-secondary hidden" id="btn-back">Назад</button>
        <button class="btn btn-primary" id="btn-next">Далі</button>
    </div>

    <script>
        let currentStep = 1;
        const totalSteps = 5;

        const btnNext = document.getElementById('btn-next');
        const btnBack = document.getElementById('btn-back');

        function updateUI() {
            // Ховаємо всі кроки, показуємо потрібний
            document.querySelectorAll('.step').forEach(el => el.classList.remove('active'));
            document.getElementById(`step-${currentStep}`).classList.add('active');

            // Оновлюємо смужку прогресу
            for(let i = 1; i <= totalSteps; i++) {
                const pb = document.getElementById(`pb-${i}`);
                if (i <= currentStep) pb.classList.add('active');
                else pb.classList.remove('active');
            }

            // Логіка кнопок
            if (currentStep === 1) {
                btnBack.classList.add('hidden');
            } else {
                btnBack.classList.remove('hidden');
            }

            if (currentStep === totalSteps) {
                btnNext.innerHTML = '🚀 Опублікувати';
                // Динамічно підтягуємо назву в прев'ю
                const title = document.getElementById('in-title').value;
                document.getElementById('out-title').innerText = title ? title : 'ТВІЙ ІВЕНТ';
            } else {
                btnNext.innerHTML = 'Далі';
            }
        }

        btnNext.addEventListener('click', () => {
            if (currentStep < totalSteps) {
                currentStep++;
                updateUI();
            } else {
                alert("Ура! Дані полетять на бекенд (в базу Railway), і юзера перекине на Головний екран!");
            }
        });

        btnBack.addEventListener('click', () => {
            if (currentStep > 1) {
                currentStep--;
                updateUI();
            }
        });
    </script>
</body>
</html>
